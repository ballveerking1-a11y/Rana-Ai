<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sikandar AI Master v11.0</title>
    
    <!-- External Assets -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --cyan: #00f2ff;
            --blue: #0066ff;
            --bg: #000b18;
            --glass: rgba(0, 20, 40, 0.85);
            --border: rgba(0, 242, 255, 0.25);
            --shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #001a33 0%, #000b18 100%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR HISTORY --- */
        .sidebar {
            width: 320px;
            background: var(--glass);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-family: 'Orbitron';
            color: var(--cyan);
            font-size: 14px;
            display: flex; justify-content: space-between;
        }

        #historyList {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .history-card {
            background: rgba(255,255,255,0.03);
            border-right: 3px solid var(--cyan);
            padding: 10px;
            margin-bottom: 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        /* --- MAIN INTERFACE --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .core-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .neural-arc {
            position: relative;
            width: 300px; height: 300px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top: 2px solid var(--cyan);
            animation: rotate var(--s) linear infinite;
        }
        .ring-1 { width: 100%; height: 100%; --s: 6s; opacity: 0.2; }
        .ring-2 { width: 80%; height: 80%; --s: 4s; border-top-color: var(--blue); opacity: 0.5; }
        .ring-3 { width: 60%; height: 60%; --s: 2s; box-shadow: inset 0 0 20px var(--cyan); }

        .center-node {
            width: 80px; height: 80px;
            background: radial-gradient(circle, var(--cyan), var(--blue));
            border-radius: 50%;
            box-shadow: 0 0 50px var(--cyan);
            z-index: 10;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .listening .center-node {
            animation: pulse 0.8s infinite alternate;
            background: #ff004c;
            box-shadow: 0 0 60px #ff004c;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* --- OUTPUT PANEL --- */
        .output-panel {
            height: 180px;
            background: rgba(0,0,0,0.6);
            border-top: 2px solid var(--border);
            padding: 25px;
            font-family: 'Noto Nastaliq Urdu', serif;
            font-size: 20px;
            text-align: center;
            color: var(--cyan);
            backdrop-filter: blur(10px);
        }

        /* --- SETTINGS MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box {
            background: #001226; border: 1px solid var(--cyan);
            padding: 30px; border-radius: 10px; width: 420px;
            box-shadow: var(--shadow);
        }
        .modal-box h2 { font-family: 'Orbitron'; margin-bottom: 20px; color: var(--cyan); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; margin-bottom: 5px; color: var(--blue); }
        .input-group input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); color: white; outline: none;
        }
        .btn-prime {
            width: 100%; padding: 15px; background: var(--cyan);
            color: black; font-weight: bold; border: none; cursor: pointer;
            font-family: 'Orbitron';
        }

        /* --- CONTROLS --- */
        .floating-ctrl {
            position: absolute; bottom: 200px; left: 30px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .ctrl-btn {
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--border);
            color: var(--cyan); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #preview-panel {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: white; z-index: 2000; transition: 0.5s;
        }
    </style>
</head>
<body>

    <!-- Sidebar History -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span>NEURAL LOGS</span>
            <i class="fas fa-brain"></i>
        </div>
        <div id="historyList"></div>
        <div id="stats" style="padding:15px; font-size:10px; color:var(--cyan); opacity:0.5; font-family:'Orbitron';">
            PAK TIME: <span id="clock">00:00:00</span>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-container">
        <div class="core-section">
            <div class="neural-arc" id="arcBody" onclick="startSikandar()">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
                <div class="center-node">
                    <i class="fas fa-microphone fa-2x" style="color:black;"></i>
                </div>
            </div>
            <p id="statusTxt" style="margin-top:30px; font-family:'Orbitron'; letter-spacing:4px; font-size:12px; color:var(--cyan);">SYSTEM ONLINE</p>
        </div>

        <div class="output-panel" id="mainDisplay">
            "خوش آمدید، سکندر اعظم سر۔ میں آپ کے حکم کا منتظر ہوں۔"
        </div>

        <!-- Buttons -->
        <div class="floating-ctrl">
            <button class="ctrl-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
            <button class="ctrl-btn" onclick="togglePreview()"><i class="fas fa-code"></i></button>
        </div>
    </main>

    <!-- Modals -->
    <div class="modal" id="settingsModal">
        <div class="modal-box">
            <h2>SYSTEM CONFIG</h2>
            <div class="input-group">
                <label>GROQ CLOUD KEY</label>
                <input type="password" id="apiKey" placeholder="Enter API Key">
            </div>
            <div class="input-group">
                <label>ACTIVE MODEL</label>
                <input type="text" id="modelName" value="llama3-70b-8192">
            </div>
            <button class="btn-prime" onclick="saveSettings()">CALIBRATE SYSTEM</button>
            <p onclick="toggleSettings()" style="text-align:center; color:red; margin-top:15px; cursor:pointer;">ABORT</p>
        </div>
    </div>

    <!-- Preview Panel -->
    <div id="preview-panel">
        <div style="background:#111; color:var(--cyan); padding:10px; display:flex; justify-content:space-between;">
            <span style="font-family:'Orbitron';">CODE RENDERER (ENGLISH)</span>
            <button onclick="togglePreview()" style="color:red; background:none; border:none; cursor:pointer;">CLOSE</button>
        </div>
        <iframe id="previewFrame" style="width:100%; height:calc(100% - 40px); border:none;"></iframe>
    </div>

    <script>
        // --- Memory & Config ---
        let appState = {
            key: localStorage.getItem('sk_key_v11') || '',
            model: localStorage.getItem('sk_model_v11') || 'llama3-70b-8192',
            history: JSON.parse(localStorage.getItem('sk_history_v11') || '[]')
        };

        const mainDisplay = document.getElementById('mainDisplay');
        const historyList = document.getElementById('historyList');

        // --- Clock Update ---
        function updateClock() {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'Asia/Karachi', hour12: false });
            document.getElementById('clock').innerText = now;
        }
        setInterval(updateClock, 1000);

        // --- Voice Setup ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';

        recognition.onstart = () => {
            document.getElementById('arcBody').classList.add('listening');
            document.getElementById('statusTxt').innerText = 'NEURAL CAPTURE ACTIVE';
        };

        recognition.onend = () => {
            document.getElementById('arcBody').classList.remove('listening');
            document.getElementById('statusTxt').innerText = 'SYSTEM STANDBY';
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            processBrain(transcript);
        };

        function startSikandar() {
            if(!appState.key) {
                speak("سکندر اعظم سر، براہ کرم پہلے سیٹنگز میں اے پی آئی کی سیٹ کریں۔");
                toggleSettings();
                return;
            }
            recognition.start();
        }

        // --- Command Brain ---
        async function processBrain(input) {
            updateHistoryUI("آپ: " + input);

            // 1. WhatsApp Logic
            if (input.includes('WhatsApp') || input.includes('واٹس ایپ')) {
                if (input.includes('میسج')) {
                    speak("سکندر اعظم سر، کس نمبر پر میسج بھیجنا ہے؟ (نمبر بتائیں)");
                    // Special logic for WhatsApp flow could be added here
                    // Current shortcut: Opens WA Search
                    window.open(`whatsapp://send?text=Hello from Sikandar AI`, '_blank');
                    return;
                }
            }

            // 2. Apps Launcher (Package Names)
            const packageMap = {
                'یوٹیوب': 'com.google.android.youtube',
                'فیس بک': 'com.facebook.katana',
                'پلے اسٹور': 'com.android.vending',
                'گوگل': 'com.google.android.googlequicksearchbox'
            };

            for (let app in packageMap) {
                if (input.includes(app)) {
                    speak(`سکندر اعظم سر، ${app} کھول رہا ہوں۔`);
                    window.location.href = `intent://#Intent;package=${packageMap[app]};action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end`;
                    return;
                }
            }

            // 3. Time/Date Logic
            if (input.includes('وقت') || input.includes('ٹائم')) {
                const pakTime = new Date().toLocaleTimeString('ur-PK', { timeZone: 'Asia/Karachi' });
                speak(`سکندر اعظم سر، ابھی پاکستان میں وقت ${pakTime} ہو رہا ہے۔`);
                return;
            }

            // 4. AI Deep Processing
            askAI(input);
        }

        async function askAI(prompt) {
            mainDisplay.innerText = "پروسیسنگ، سکندر اعظم سر...";
            
            // Context Awareness: Sending history to AI
            const messages = [
                { role: "system", content: "Your name is Sikandar AI. Always address user as 'Sikandar Azam Sir'. Respond in Urdu. IMPORTANT: Any code (HTML/CSS/JS) you generate must be in ENGLISH language only. Use the provided conversation history to understand the context." },
                ...appState.history.slice(-10), // Send last 10 messages
                { role: "user", content: prompt }
            ];

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${appState.key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: appState.model,
                        messages: messages
                    })
                });

                const data = await response.json();
                const aiReply = data.choices[0].message.content;

                // Save to History
                appState.history.push({ role: "user", content: prompt });
                appState.history.push({ role: "assistant", content: aiReply });
                if(appState.history.length > 20) appState.history.shift();
                localStorage.setItem('sk_history_v11', JSON.stringify(appState.history));

                if (aiReply.includes("```html")) {
                    const code = aiReply.match(/```html([\s\S]*?)```/)[1].trim();
                    document.getElementById('previewFrame').srcdoc = code;
                    togglePreview();
                    speak("سکندر اعظم سر، میں نے انگریزی زبان میں کوڈ تیار کر دیا ہے۔ آپ پریویو دیکھ سکتے ہیں۔");
                } else {
                    speak(aiReply);
                }

            } catch (err) {
                speak("سکندر اعظم سر، معذرت، اے پی آئی کنکشن میں مسئلہ ہے۔");
            }
        }

        function speak(text) {
            mainDisplay.innerText = text;
            updateHistoryUI("AI: " + text);
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ur-PK';
            window.speechSynthesis.speak(uttr);
        }

        function updateHistoryUI(msg) {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.innerText = msg;
            historyList.prepend(card);
        }

        // --- System Handlers ---
        function toggleSettings() {
            const m = document.getElementById('settingsModal');
            document.getElementById('apiKey').value = appState.key;
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            appState.key = document.getElementById('apiKey').value;
            appState.model = document.getElementById('modelName').value;
            localStorage.setItem('sk_key_v11', appState.key);
            localStorage.setItem('sk_model_v11', appState.model);
            alert("SYSTEM CALIBRATED!");
            toggleSettings();
        }

        function togglePreview() {
            const p = document.getElementById('preview-panel');
            p.style.right = (p.style.right === '0px') ? '-100%' : '0px';
        }

        // Init History
        appState.history.forEach(m => updateHistoryUI(`${m.role === 'user' ? 'آپ' : 'AI'}: ${m.content}`));
    </script>
</body>
</html>
