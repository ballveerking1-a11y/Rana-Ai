<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sikandar Azam AI — Ultra v7.0</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff007a;
            --bg: #05070a;
            --card: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e2e8f0;
            --radius: 24px;
            --glow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar Style */
        .sidebar {
            width: 300px;
            background: rgba(2, 6, 23, 0.95);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .brand {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .brand h1 {
            font-size: 22px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .history-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .history-item:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        /* Reactor Core (The Mic Button) */
        .reactor-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reactor-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary);
            box-shadow: var(--glow);
            animation: pulse 2s infinite;
        }

        .reactor-core {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            box-shadow: 0 0 30px var(--secondary);
        }

        .reactor-core:hover { transform: scale(1.1); }
        .reactor-core i { font-size: 40px; color: white; }

        .status-text {
            margin-top: 30px;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* Response Box */
        .response-box {
            width: 100%;
            max-width: 700px;
            margin-top: 40px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: var(--radius);
            backdrop-filter: blur(15px);
            text-align: center;
            min-height: 100px;
            font-family: 'Noto Nastaliq Urdu', serif;
            line-height: 2;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Preview Panel */
        #preview-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 50%;
            height: 100%;
            background: white;
            z-index: 200;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        #preview-panel.active { right: 0; }

        .preview-header {
            background: #1a1a1a;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-header button {
            background: var(--primary);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #preview-frame {
            flex: 1;
            border: none;
            width: 100%;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .listening .reactor-ring {
            border-color: var(--accent);
            animation: pulse 0.5s infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 150px; }
            #preview-panel { width: 100%; }
        }

    </style>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar History -->
    <aside class="sidebar">
        <div class="brand">
            <h1>Sikandar Azam AI</h1>
            <p style="font-size: 10px; color: var(--primary);">ULTRA EDITION v7.0</p>
        </div>
        <div class="history-container" id="historyBox">
            <!-- History items will appear here -->
        </div>
        <button onclick="clearHistory()" style="background:none; border:1px solid var(--border); color: #ff4444; padding: 10px; border-radius: 10px; cursor:pointer;">تاریخ صاف کریں</button>
    </aside>

    <!-- Main Interface -->
    <main class="main-content">
        <div class="reactor-container" id="micWrapper">
            <div class="reactor-ring"></div>
            <div class="reactor-core" onclick="startSikandar()">
                <i class="fas fa-microphone" id="micIcon"></i>
            </div>
        </div>

        <div class="status-text" id="status">اسٹینڈ بائی</div>

        <div class="response-box" id="output">
            "جی سر سکندر اعظم، میں آپ کی کیا مدد کر سکتا ہوں؟"
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="history-item" onclick="processCommand('پاکستان کا وقت کیا ہے؟')">🕒 وقت</button>
            <button class="history-item" onclick="processCommand('پلے اسٹور پر فیس بک ڈھونڈو')">📱 ایپس</button>
            <button class="history-item" onclick="processCommand('ایک خوبصورت لاگ ان پیج بناؤ')">💻 کوڈنگ</button>
        </div>
    </main>

    <!-- HTML Preview Panel -->
    <div id="preview-panel">
        <div class="preview-header">
            <span>لائیو پریویو (Live Preview)</span>
            <div>
                <button onclick="downloadCode()" style="background: #22c55e; margin-right: 10px;">ڈاؤن لوڈ</button>
                <button onclick="togglePreview()" style="background: #ef4444;">بند کریں</button>
            </div>
        </div>
        <iframe id="preview-frame"></iframe>
    </div>

    <script>
        // --- configuration ---
        const API_KEY = "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"; // Groq Key
        const MODEL = "llama3-70b-8192";
        
        const outputEl = document.getElementById('output');
        const statusEl = document.getElementById('status');
        const micWrapper = document.getElementById('micWrapper');
        const previewPanel = document.getElementById('preview-panel');
        const previewFrame = document.getElementById('preview-frame');
        
        let lastGeneratedCode = "";

        // --- Speech Recognition Setup ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ur-PK';

        recognition.onstart = () => {
            micWrapper.classList.add('listening');
            statusEl.innerText = "سن رہا ہوں...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            processCommand(transcript);
        };

        recognition.onend = () => {
            micWrapper.classList.remove('listening');
            statusEl.innerText = "اسٹینڈ بائی";
        };

        function startSikandar() {
            recognition.start();
        }

        // --- Main Logic Processor ---
        async function processCommand(cmd) {
            outputEl.innerText = `آپ نے کہا: ${cmd}`;
            saveToHistory(cmd);

            // 1. Time & Date logic
            if (cmd.includes('وقت') || cmd.includes('ٹائم')) {
                const time = new Date().toLocaleTimeString('ur-PK');
                speak(`سر، ابھی وقت ہے ${time}`);
                return;
            }
            if (cmd.includes('تاریخ')) {
                const date = new Date().toLocaleDateString('ur-PK');
                speak(`سر، آج کی تاریخ ہے ${date}`);
                return;
            }

            // 2. Play Store & App Opening Logic
            if (cmd.includes('Play Store') || cmd.includes('پلے اسٹور')) {
                let search = cmd.replace(/پلے اسٹور|پر|ڈھونڈو|سرچ کرو|Play Store|search/g, "").trim();
                speak(`سر، پلے اسٹور پر ${search || 'ایپس'} کھول رہا ہوں۔`);
                if(search) {
                    window.open(`https://play.google.com/store/search?q=${encodeURIComponent(search)}&c=apps`);
                } else {
                    window.open(`https://play.google.com/store/games`);
                }
                return;
            }

            // 3. YouTube Search
            if (cmd.includes('یوٹیوب') || cmd.includes('YouTube')) {
                let search = cmd.replace(/یوٹیوب|پر|چلاؤ|دکھاؤ|YouTube|search/g, "").trim();
                speak(`سر، یوٹیوب پر ${search} چلا رہا ہوں۔`);
                window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(search)}`);
                return;
            }

            // 4. Default: AI Response (Groq)
            askAI(cmd);
        }

        // --- Groq AI API Call ---
        async function askAI(prompt) {
            statusEl.innerText = "سوچ رہا ہوں...";
            
            const systemPrompt = `You are Sikandar Azam AI v7.0. A professional, helpful assistant.
            - Respond in Urdu language.
            - If the user asks for code (HTML/CSS/JS), provide the FULL code inside a single \`\`\`html block.
            - Always call the user "Sir" or "Sikandar Azam Sir".
            - Be concise but smart.`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: prompt }
                        ]
                    })
                });

                const data = await response.json();
                const aiReply = data.choices[0].message.content;
                
                // Check if reply contains HTML code
                if (aiReply.includes("```html")) {
                    const code = aiReply.match(/```html([\s\S]*?)```/)[1].trim();
                    handleCodeGeneration(code);
                    speak("سر، میں نے آپ کے لیے کوڈ تیار کر دیا ہے۔ آپ پریویو دیکھ سکتے ہیں۔");
                } else {
                    speak(aiReply);
                }

            } catch (error) {
                console.error(error);
                speak("معذرت سر، API کنکشن میں کوئی مسئلہ آ رہا ہے۔");
            } finally {
                statusEl.innerText = "اسٹینڈ بائی";
            }
        }

        // --- Code Handling ---
        function handleCodeGeneration(code) {
            lastGeneratedCode = code;
            outputEl.innerHTML = `<p>سر، آپ کا HTML کوڈ تیار ہے!</p><button onclick="togglePreview()" style="background:var(--primary); border:none; padding:10px; border-radius:10px; margin-top:10px; cursor:pointer;">پریویو دیکھیں (Preview)</button>`;
            previewFrame.srcdoc = code;
        }

        function togglePreview() {
            previewPanel.classList.toggle('active');
        }

        function downloadCode() {
            const blob = new Blob([lastGeneratedCode], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'sikandar_azam_index.html';
            a.click();
        }

        // --- TTS (Voice) ---
        function speak(text) {
            outputEl.innerText = text;
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ur-PK';
            window.speechSynthesis.speak(uttr);
        }

        // --- History Management ---
        function saveToHistory(text) {
            const box = document.getElementById('historyBox');
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = text;
            box.prepend(div);
        }

        function clearHistory() {
            document.getElementById('historyBox').innerHTML = "";
        }
    </script>
</body>
</html>
