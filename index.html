<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sikandar AI — Pro Assistant v9.0</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon: #00f2ff;
            --purple: #7000ff;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(0, 242, 255, 0.2);
            --glow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            background-image: 
                radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }

        /* --- DASHBOARD LAYOUT --- */
        .sidebar {
            width: 300px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 50;
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- NEURAL CORE (MIC) --- */
        .core-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .neural-core {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--neon);
            animation: spin var(--d) linear infinite;
        }
        .ring-1 { width: 100%; height: 100%; --d: 3s; border-width: 4px; opacity: 0.3; }
        .ring-2 { width: 85%; height: 85%; --d: 2s; border-top-color: var(--purple); opacity: 0.6; }
        .ring-3 { width: 70%; height: 70%; --d: 1s; box-shadow: inset 0 0 20px var(--neon); }

        .mic-btn {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--neon), var(--purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 50px var(--purple);
            transition: 0.3s;
        }
        .mic-btn i { font-size: 40px; color: #000; }
        .listening .mic-btn { animation: pulse 1s infinite alternate; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 20px var(--neon); } to { transform: scale(1.2); box-shadow: 0 0 60px var(--neon); } }

        /* --- OUTPUT CONSOLE --- */
        .console {
            height: 180px;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid var(--border);
            padding: 20px;
            font-family: 'Noto Nastaliq Urdu', serif;
            font-size: 18px;
            text-align: center;
            overflow-y: auto;
        }

        /* --- SETTINGS MODAL --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #0f172a; border: 1px solid var(--neon);
            padding: 40px; border-radius: 20px; width: 450px;
            box-shadow: var(--glow);
        }
        .modal-content h2 { font-family: 'Orbitron'; color: var(--neon); margin-bottom: 25px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 12px; color: var(--neon); margin-bottom: 8px; }
        .field input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); color: white; border-radius: 8px; outline: none;
        }
        .btn-save {
            width: 100%; padding: 15px; background: var(--neon);
            color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer;
        }

        /* --- PREVIEW PANEL --- */
        #preview-panel {
            position: fixed; top: 0; left: -100%; width: 100%; height: 100%;
            background: #fff; z-index: 2000; transition: 0.5s;
        }
        #preview-panel.active { left: 0; }
        .preview-header { background: #111; color: var(--neon); padding: 15px; display: flex; justify-content: space-between; }

        /* --- BOTTOM NAV --- */
        .controls {
            position: absolute; bottom: 200px; right: 30px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .btn-ctrl {
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--border);
            color: var(--neon); cursor: pointer; transition: 0.3s;
        }
        .btn-ctrl:hover { background: var(--neon); color: black; box-shadow: var(--glow); }

    </style>
</head>
<body>

    <!-- Sidebar History -->
    <aside class="sidebar">
        <h3 style="font-family:'Orbitron'; font-size:14px; border-bottom:1px solid var(--border); padding-bottom:10px;">DATA HISTORY</h3>
        <div id="historyBox" style="flex:1; overflow-y:auto; padding-top:15px;"></div>
        <div style="font-size: 10px; opacity: 0.5;">SIKANDAR OS v9.0.1</div>
    </aside>

    <!-- Main Section -->
    <main class="main-stage">
        <div class="core-container">
            <div class="neural-core" id="micBtn" onclick="startRecognition()">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
                <div class="mic-btn">
                    <i class="fas fa-microphone"></i>
                </div>
            </div>
            <div id="status" style="margin-top: 30px; font-family:'Orbitron'; letter-spacing:3px; font-size:12px; color:var(--neon);">SYSTEM READY</div>
        </div>

        <div class="console" id="output">"جی سر سکندر، حکم کریں؟"</div>

        <!-- Floating Controls -->
        <div class="controls">
            <button class="btn-ctrl" onclick="toggleSettings()" title="Settings"><i class="fas fa-cog"></i></button>
            <button class="btn-ctrl" onclick="togglePreview()" title="Code Preview"><i class="fas fa-code"></i></button>
            <button class="btn-ctrl" onclick="downloadCode()" title="Download Code"><i class="fas fa-download"></i></button>
        </div>
    </main>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>SYSTEM CONFIG</h2>
            <div class="field">
                <label>GROQ API KEY</label>
                <input type="password" id="apiKeyInput" placeholder="Paste your key here...">
            </div>
            <div class="field">
                <label>AI MODEL NAME</label>
                <input type="text" id="modelInput" placeholder="e.g. llama3-70b-8192">
            </div>
            <button class="btn-save" onclick="saveSettings()">SAVE & CALIBRATE</button>
            <p onclick="toggleSettings()" style="color:red; text-align:center; margin-top:15px; cursor:pointer;">CLOSE</p>
        </div>
    </div>

    <!-- Live Preview Panel -->
    <div id="preview-panel">
        <div class="preview-header">
            <span>Sikandar Code Renderer</span>
            <button onclick="togglePreview()" style="background:red; color:white; border:none; padding:5px 15px; cursor:pointer;">EXIT</button>
        </div>
        <iframe id="preview-frame" style="width:100%; height:calc(100% - 50px); border:none;"></iframe>
    </div>

    <script>
        // --- Persistence & Config ---
        let config = {
            apiKey: localStorage.getItem('sk_pro_key') || '',
            model: localStorage.getItem('sk_pro_model') || 'llama3-70b-8192'
        };

        const outputEl = document.getElementById('output');
        const statusEl = document.getElementById('status');
        const micBtn = document.getElementById('micBtn');
        const previewFrame = document.getElementById('preview-frame');
        const previewPanel = document.getElementById('preview-panel');
        let lastCode = "";

        // --- Voice Engine ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';

        recognition.onstart = () => {
            micBtn.classList.add('listening');
            statusEl.innerText = "LISTENING...";
        };

        recognition.onend = () => {
            micBtn.classList.remove('listening');
            statusEl.innerText = "SYSTEM STANDBY";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            handleCommand(transcript);
        };

        function startRecognition() {
            if(!config.apiKey) {
                speak("سر، پہلے سیٹنگز میں جا کر اپنی اے پی آئی کی ڈالیں۔");
                toggleSettings();
                return;
            }
            recognition.start();
        }

        // --- Intelligence Hub ---
        async function handleCommand(cmd) {
            updateHistory(cmd);
            outputEl.innerText = `آپ نے کہا: ${cmd}`;

            // 1. App Launcher Logic
            const apps = {
                'یوٹیوب': 'https://www.youtube.com',
                'واٹس ایپ': 'whatsapp://',
                'فیس بک': 'https://www.facebook.com',
                'پلے اسٹور': 'https://play.google.com/store/games',
                'گوگل میپس': 'https://maps.google.com'
            };

            for (let app in apps) {
                if (cmd.includes(app)) {
                    speak(`جی سر، ${app} کھول رہا ہوں۔`);
                    window.open(apps[app], '_blank');
                    return;
                }
            }

            // 2. Time/Date Logic
            if (cmd.includes('وقت') || cmd.includes('ٹائم')) {
                speak(`سر، ابھی وقت ہے ${new Date().toLocaleTimeString('ur-PK')}`);
                return;
            }

            // 3. AI Query
            askAI(cmd);
        }

        async function askAI(prompt) {
            statusEl.innerText = "THINKING...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [
                            { role: "system", content: "You are Sikandar AI, a world-class assistant. Answer in Urdu. If code is requested, provide it ONLY inside ```html blocks." },
                            { role: "user", content: prompt }
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;

                if (reply.includes("```html")) {
                    lastCode = reply.match(/```html([\s\S]*?)```/)[1].trim();
                    previewFrame.srcdoc = lastCode;
                    speak("سر، کوڈ تیار ہے۔ میں نے پریویو لوڈ کر دیا ہے۔");
                    togglePreview();
                } else {
                    speak(reply);
                }
            } catch (e) {
                speak("معذرت سر، کنکشن میں خرابی ہے۔ اپنی اے پی آئی کی چیک کریں۔");
            }
        }

        // --- UI Utils ---
        function speak(text) {
            outputEl.innerText = text;
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ur-PK';
            window.speechSynthesis.speak(uttr);
        }

        function toggleSettings() {
            const m = document.getElementById('settingsModal');
            document.getElementById('apiKeyInput').value = config.apiKey;
            document.getElementById('modelInput').value = config.model;
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            config.apiKey = document.getElementById('apiKeyInput').value;
            config.model = document.getElementById('modelInput').value;
            localStorage.setItem('sk_pro_key', config.apiKey);
            localStorage.setItem('sk_pro_model', config.model);
            alert("SYSTEM UPDATED!");
            toggleSettings();
        }

        function togglePreview() {
            previewPanel.classList.toggle('active');
        }

        function downloadCode() {
            if(!lastCode) return alert("No code to download!");
            const b = new Blob([lastCode], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = "sikandar_project.html";
            a.click();
        }

        function updateHistory(text) {
            const h = document.getElementById('historyBox');
            const d = document.createElement('div');
            d.style = "padding:8px; background:rgba(255,255,255,0.05); margin-bottom:5px; font-size:12px; border-right:2px solid var(--neon);";
            d.innerText = text;
            h.prepend(d);
        }
    </script>
</body>
</html>
