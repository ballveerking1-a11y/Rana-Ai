<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sikandar AI v12.0</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #010409;
            --card: #0d1117;
            --border: rgba(0, 242, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- MOBILE HEADER --- */
        header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--card);
        }
        header h1 { font-family: 'Orbitron'; font-size: 18px; color: var(--primary); letter-spacing: 2px; }

        /* --- MAIN VIEWPORT --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        /* ARC REACTOR MIC */
        .reactor-core {
            width: 220px; height: 220px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .ring {
            position: absolute; border-radius: 50%; border: 2px solid transparent;
            border-top-color: var(--primary); animation: spin var(--s) linear infinite;
        }
        .r1 { width: 100%; height: 100%; --s: 5s; opacity: 0.3; }
        .r2 { width: 80%; height: 80%; --s: 3s; border-top-color: var(--secondary); }
        .r3 { width: 60%; height: 60%; --s: 2s; box-shadow: inset 0 0 20px var(--primary); }
        
        .core-center {
            width: 70px; height: 70px;
            background: var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px var(--primary); z-index: 10;
        }
        .core-center i { color: black; font-size: 24px; }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- CONSOLE / OUTPUT --- */
        .output-box {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            min-height: 120px;
            font-family: 'Noto Nastaliq Urdu', serif;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }

        /* --- BOTTOM NAVIGATION --- */
        nav {
            height: 70px;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item { color: #8b949e; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* --- MODALS --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: var(--card); border: 1px solid var(--primary);
            padding: 25px; border-radius: 20px; width: 100%; max-width: 400px;
        }
        .modal-content h2 { font-family: 'Orbitron'; color: var(--primary); margin-bottom: 20px; font-size: 16px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; margin-bottom: 5px; color: #8b949e; }
        .input-group input {
            width: 100%; padding: 12px; background: #161b22;
            border: 1px solid #30363d; color: white; border-radius: 8px; outline: none;
        }
        .btn-test {
            width: 100%; padding: 12px; background: transparent; border: 1px solid var(--secondary);
            color: var(--secondary); border-radius: 8px; margin-bottom: 10px; cursor: pointer;
        }
        .btn-save {
            width: 100%; padding: 12px; background: var(--primary); color: black;
            font-weight: bold; border: none; border-radius: 8px; cursor: pointer;
        }

        /* --- PREVIEW PANEL --- */
        #preview-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #preview-panel.active { transform: translateY(0); }
        .preview-header {
            background: #000; color: white; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .preview-header button {
            background: var(--primary); color: black; border: none;
            padding: 8px 15px; border-radius: 5px; font-weight: bold;
        }

        /* --- LOGS MODAL --- */
        #logsModal .log-item {
            padding: 10px; border-bottom: 1px solid #30363d; font-size: 13px;
        }

    </style>
</head>
<body>

    <header>
        <h1>SIKANDAR AI v12</h1>
    </header>

    <main>
        <div class="reactor-core" id="micBtn" onclick="startSikandar()">
            <div class="ring r1"></div>
            <div class="ring r2"></div>
            <div class="ring r3"></div>
            <div class="core-center" id="coreNode">
                <i class="fas fa-microphone"></i>
            </div>
        </div>

        <div id="statusLabel" style="font-size: 10px; color: var(--primary); margin-top: 15px; letter-spacing: 2px;">ONLINE</div>

        <div class="output-box" id="outputConsole">
            "سکندر اعظم سر، میں آپ کا منتظر ہوں۔"
        </div>
    </main>

    <nav>
        <div class="nav-item" onclick="toggleModal('logsModal')"><i class="fas fa-history"></i></div>
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="toggleModal('settingsModal')"><i class="fas fa-sliders-h"></i></div>
    </nav>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>SYSTEM SETTINGS</h2>
            <div class="input-group">
                <label>GROQ API KEY</label>
                <input type="password" id="apiKey" placeholder="Enter Key">
            </div>
            <div class="input-group">
                <label>MODEL</label>
                <input type="text" id="modelName" value="llama3-70b-8192">
            </div>
            <button class="btn-test" id="testBtn" onclick="testConnection()">TEST CONNECTION</button>
            <button class="btn-save" onclick="saveSettings()">SAVE & APPLY</button>
            <p onclick="toggleModal('settingsModal')" style="text-align:center; color:red; margin-top:15px; font-size:12px; cursor:pointer;">CLOSE</p>
        </div>
    </div>

    <!-- Logs Modal -->
    <div class="modal" id="logsModal">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
            <h2>CONVERSATION LOGS</h2>
            <div id="logsContainer"></div>
            <button class="btn-save" style="margin-top: 20px;" onclick="toggleModal('logsModal')">BACK</button>
        </div>
    </div>

    <!-- Preview Panel -->
    <div id="preview-panel">
        <div class="preview-header">
            <span>LIVE PREVIEW</span>
            <div>
                <button onclick="downloadCode()" style="background:#2ecc71; margin-right:5px;"><i class="fas fa-download"></i></button>
                <button onclick="togglePreview()" style="background:#e74c3c;">X</button>
            </div>
        </div>
        <iframe id="previewFrame" style="width:100%; height:calc(100% - 60px); border:none;"></iframe>
    </div>

    <script>
        // --- Persistence Layer ---
        let appData = {
            apiKey: localStorage.getItem('sk_v12_key') || '',
            model: localStorage.getItem('sk_v12_model') || 'llama3-70b-8192',
            history: JSON.parse(localStorage.getItem('sk_v12_history') || '[]')
        };

        const outputConsole = document.getElementById('outputConsole');
        const logsContainer = document.getElementById('logsContainer');

        // --- Voice Logic ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';

        recognition.onstart = () => {
            document.getElementById('coreNode').style.background = '#ff004c';
            document.getElementById('statusLabel').innerText = 'LISTENING...';
        };

        recognition.onend = () => {
            document.getElementById('coreNode').style.background = 'var(--primary)';
            document.getElementById('statusLabel').innerText = 'ONLINE';
        };

        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            handleCommand(transcript);
        };

        function startSikandar() {
            if(!appData.apiKey) {
                speak("سکندر اعظم سر، براہ کرم پہلے سیٹنگز میں اے پی آئی کی ڈالیں۔");
                toggleModal('settingsModal');
                return;
            }
            recognition.start();
        }

        // --- Brain ---
        async function handleCommand(cmd) {
            updateLogs("User: " + cmd);
            
            // Time Logic
            if(cmd.includes('وقت') || cmd.includes('ٹائم')) {
                const time = new Date().toLocaleTimeString('ur-PK', {timeZone: 'Asia/Karachi'});
                speak(`سکندر اعظم سر، ابھی وقت ${time} ہو رہا ہے۔`);
                return;
            }

            // WhatsApp Logic
            if(cmd.includes('واٹس ایپ') || cmd.includes('WhatsApp')) {
                speak("سکندر اعظم سر، واٹس ایپ کھول رہا ہوں۔");
                window.location.href = "intent://#Intent;package=com.whatsapp;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end";
                return;
            }

            askAI(cmd);
        }

        async function askAI(prompt) {
            outputConsole.innerText = "سکندر اعظم سر، میں سوچ رہا ہوں...";
            
            // Include History for perfect memory
            const messages = [
                { role: "system", content: "Your name is Sikandar AI. Always address user as 'Sikandar Azam Sir'. Respond in professional Urdu. Generate code in ENGLISH only. You remember everything from the history below." },
                ...appData.history.slice(-6),
                { role: "user", content: prompt }
            ];

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${appData.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ model: appData.model, messages: messages })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                const aiReply = data.choices[0].message.content;

                // Store memory
                appData.history.push({ role: "user", content: prompt });
                appData.history.push({ role: "assistant", content: aiReply });
                if(appData.history.length > 20) appData.history.shift();
                localStorage.setItem('sk_v12_history', JSON.stringify(appData.history));

                if(aiReply.includes("```html")) {
                    const code = aiReply.match(/```html([\s\S]*?)```/)[1].trim();
                    window.lastCode = code;
                    document.getElementById('previewFrame').srcdoc = code;
                    togglePreview();
                    speak("سکندر اعظم سر، میں نے کوڈ تیار کر دیا ہے، آپ ڈاؤن لوڈ کر سکتے ہیں۔");
                } else {
                    speak(aiReply);
                }
            } catch (err) {
                speak("معذرت سکندر اعظم سر، کنکشن میں خرابی آئی ہے۔ براہ کرم سیٹنگز میں ٹیسٹ کریں۔");
            }
        }

        // --- Connection Testing ---
        async function testConnection() {
            const btn = document.getElementById('testBtn');
            const key = document.getElementById('apiKey').value;
            if(!key) return alert("Please enter API Key first!");
            
            btn.innerText = "TESTING...";
            btn.style.color = "orange";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama3-8b-8192", messages: [{role:"user", content:"hi"}], max_tokens: 5 })
                });
                
                if(res.ok) {
                    btn.innerText = "CONNECTION SUCCESSFUL!";
                    btn.style.borderColor = "#2ecc71";
                    btn.style.color = "#2ecc71";
                } else {
                    throw new Error();
                }
            } catch (e) {
                btn.innerText = "CONNECTION FAILED!";
                btn.style.borderColor = "#e74c3c";
                btn.style.color = "#e74c3c";
            }
        }

        // --- Helpers ---
        function speak(text) {
            outputConsole.innerText = text;
            updateLogs("AI: " + text);
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ur-PK';
            window.speechSynthesis.speak(uttr);
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            if(id === 'settingsModal') {
                document.getElementById('apiKey').value = appData.apiKey;
            }
            if(id === 'logsModal') renderLogs();
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            appData.apiKey = document.getElementById('apiKey').value;
            appData.model = document.getElementById('modelName').value;
            localStorage.setItem('sk_v12_key', appData.apiKey);
            localStorage.setItem('sk_v12_model', appData.model);
            alert("SETTINGS SAVED!");
            toggleModal('settingsModal');
        }

        function togglePreview() {
            document.getElementById('preview-panel').classList.toggle('active');
        }

        function downloadCode() {
            const blob = new Blob([window.lastCode], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Sikandar_Azam_Project.html";
            a.click();
        }

        function updateLogs(msg) {
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerText = msg;
            logsContainer.prepend(logItem);
        }

        function renderLogs() {
            logsContainer.innerHTML = "";
            appData.history.forEach(h => updateLogs(`${h.role === 'user' ? 'آپ' : 'AI'}: ${h.content}`));
        }
    </script>
</body>
</html>
