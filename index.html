<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rana AI - Advanced Jarvis Edition</title>
    <style>
        :root {
            --glow-cyan: #00f2ff;
            --deep-blue: #020617;
            --iron-red: #ff0055;
            --text-color: #e2e8f0;
        }

        body {
            background: var(--deep-blue);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Sidebar for AI */
        .main-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-right: 1px solid rgba(0, 242, 255, 0.2);
        }

        /* Preview Panel */
        #preview-panel {
            flex: 1; background: white; display: none;
            flex-direction: column; border-left: 2px solid var(--glow-cyan);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .preview-header {
            background: #1e293b; color: var(--glow-cyan);
            padding: 10px; font-size: 12px; display: flex; justify-content: space-between;
        }

        /* Arc Reactor */
        .reactor-shell {
            width: 150px; height: 150px; border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }

        .reactor-shell::before {
            content: ''; position: absolute; width: 170px; height: 170px;
            border: 1px dashed var(--glow-cyan); border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .core {
            width: 80px; height: 80px;
            background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 75%);
            border-radius: 50%; border: 4px solid var(--glow-cyan);
            box-shadow: 0 0 30px var(--glow-cyan);
        }

        .listening .core {
            animation: pulse 0.5s infinite alternate;
            border-color: var(--iron-red);
            background: radial-gradient(circle, var(--iron-red) 0%, transparent 75%);
            box-shadow: 0 0 40px var(--iron-red);
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .status-text { margin-top: 20px; letter-spacing: 2px; color: var(--glow-cyan); font-size: 12px; }

        .response-container {
            width: 90%; max-width: 500px; margin-top: 20px; padding: 15px;
            background: rgba(15, 23, 42, 0.8); border-radius: 10px;
            text-align: center; font-size: 18px; direction: rtl;
        }

        .settings-btn { position: fixed; bottom: 20px; left: 20px; cursor: pointer; font-size: 24px; }

        #config-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000;
        }

        .modal-box { background: #0f172a; padding: 25px; border-radius: 10px; width: 300px; border: 1px solid var(--glow-cyan); }
        
        input, select { width: 100%; padding: 8px; margin: 10px 0; background: #020617; color: white; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="status-text" id="status">System: Standby</div>
        <div class="reactor-shell" id="mic-trigger" onclick="startRana()">
            <div class="core"></div>
        </div>
        <div class="response-container" id="output">
            "سر، میں آپ کے حکم کا انتظار کر رہا ہوں۔"
        </div>
    </div>

    <div id="preview-panel">
        <div class="preview-header">
            <span>LIVE CODE PREVIEW</span>
            <button onclick="closePreview()" style="background:red; color:white; border:none; cursor:pointer;">Close</button>
        </div>
        <iframe id="preview-frame"></iframe>
    </div>

    <div class="settings-btn" onclick="toggleModal()">⚙️</div>

    <!-- Modal -->
    <div id="config-modal">
        <div class="modal-box">
            <h3>Rana Settings</h3>
            <label>API Key:</label>
            <input type="password" id="api-key">
            <label>Model:</label>
            <input type="text" id="custom-model" value="google/gemma-2-9b-it:free">
            <button onclick="saveConfig()" style="width:100%; padding:10px; background:var(--glow-cyan); border:none;">SAVE</button>
        </div>
    </div>

    <script>
        const DEFAULT_KEY = "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";
        let config = {
            key: localStorage.getItem('rana_key') || DEFAULT_KEY,
            model: localStorage.getItem('rana_model') || "google/gemma-2-9b-it:free"
        };

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';

        function toggleModal() {
            const m = document.getElementById('config-modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
            document.getElementById('api-key').value = config.key;
        }

        function saveConfig() {
            config.key = document.getElementById('api-key').value;
            config.model = document.getElementById('custom-model').value;
            localStorage.setItem('rana_key', config.key);
            localStorage.setItem('rana_model', config.model);
            toggleModal();
        }

        function closePreview() {
            document.getElementById('preview-panel').style.display = 'none';
        }

        function startRana() {
            window.speechSynthesis.cancel();
            recognition.start();
            document.getElementById('mic-trigger').classList.add('listening');
            document.getElementById('status').innerText = "System: Listening...";
        }

        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript.toLowerCase();
            document.getElementById('mic-trigger').classList.remove('listening');
            document.getElementById('output').innerText = "You: " + speech;

            // Handle Apps
            if(speech.includes("open youtube")) { window.open("https://youtube.com"); speak("جی سر، یوٹیوب کھول رہا ہوں۔"); return; }
            if(speech.includes("open whatsapp")) { window.open("https://web.whatsapp.com"); speak("جی سر، واٹس ایپ کھول رہا ہوں۔"); return; }
            if(speech.includes("open google")) { window.open("https://google.com"); speak("جی سر، گوگل کھول رہا ہوں۔"); return; }
            if(speech.includes("waqt") || speech.includes("time")) { 
                const time = new Date().toLocaleTimeString('ur-PK');
                speak("سر، ابھی وقت ہے " + time); return; 
            }
            if(speech.includes("tareekh") || speech.includes("date")) { 
                const date = new Date().toLocaleDateString('ur-PK');
                speak("سر، آج کی تاریخ ہے " + date); return; 
            }

            askAI(speech);
        };

        async function askAI(prompt) {
            document.getElementById('status').innerText = "System: Thinking...";
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": config.model,
                        "messages": [
                            {"role": "system", "content": "You are Rana, a highly advanced AI. Speak in Urdu. If the user asks for code, provide full HTML/CSS/JS code inside ```html code here ``` blocks. Do not explain the code too much in speech. Be professional."},
                            {"role": "user", "content": prompt}
                        ]
                    })
                });

                const data = await response.json();
                const aiReply = data.choices[0].message.content;
                
                processResponse(aiReply);
            } catch (err) {
                speak("معذرت سر، سسٹم میں خرابی ہے۔");
            }
        }

        function processResponse(text) {
            // Extract Code
            const codeMatch = text.match(/```html([\s\S]*?)```/);
            let speechText = text;

            if (codeMatch) {
                const code = codeMatch[1].trim();
                // Remove code from speech
                speechText = text.replace(/```html[\s\S]*?```/g, "میں نے کوڈ تیار کر دیا ہے، آپ پریویو دیکھ سکتے ہیں۔");
                
                // Show Preview
                document.getElementById('preview-panel').style.display = 'flex';
                const frame = document.getElementById('preview-frame');
                frame.srcdoc = code;
            }

            speak(speechText);
        }

        function speak(text) {
            const cleanText = text.replace(/[*#_]/g, '');
            document.getElementById('output').innerText = cleanText;
            document.getElementById('status').innerText = "System: Speaking...";

            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            // Try to find Urdu or Hindi voice
            const voices = window.speechSynthesis.getVoices();
            const urduVoice = voices.find(v => v.lang.includes('ur') || v.lang.includes('hi'));
            if(urduVoice) utterance.voice = urduVoice;
            
            utterance.lang = 'ur-PK';
            utterance.onend = () => document.getElementById('status').innerText = "System: Standby";
            window.speechSynthesis.speak(utterance);
        }

        recognition.onerror = () => {
            document.getElementById('mic-trigger').classList.remove('listening');
            document.getElementById('status').innerText = "System: Standby";
        };

        window.speechSynthesis.onvoiceschanged = () => { console.log("Voices ready"); };
    </script>
</body>
</html>
