<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sikandar Azam AI — v7.5 (Settings Update)</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #05070a;
            --card: rgba(15, 23, 42, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e2e8f0;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(2, 6, 23, 0.95);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .brand h1 {
            font-size: 22px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-align: center;
        }

        .history-container { flex: 1; overflow-y: auto; margin: 20px 0; }
        .history-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .history-item:hover { border-color: var(--primary); }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .reactor-core {
            width: 100px; height: 100px;
            background: radial-gradient(circle, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; z-index: 5;
            box-shadow: 0 0 30px var(--secondary);
            transition: 0.3s;
        }
        .reactor-core:hover { transform: scale(1.1); }
        
        .pulse-ring {
            position: absolute; width: 150px; height: 150px;
            border: 2px solid var(--primary); border-radius: 50%;
            animation: pulse 2s infinite; opacity: 0.5;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .response-box {
            width: 100%; max-width: 700px;
            margin-top: 40px; background: var(--card);
            border: 1px solid var(--border); padding: 25px;
            border-radius: var(--radius); backdrop-filter: blur(15px);
            text-align: center; font-family: 'Noto Nastaliq Urdu', serif;
            min-height: 100px;
        }

        /* Settings Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box {
            background: #0f172a; border: 1px solid var(--primary);
            padding: 30px; border-radius: 20px; width: 400px;
        }
        .modal-box h2 { margin-bottom: 20px; color: var(--primary); }
        .modal-box label { display: block; margin-bottom: 5px; font-size: 14px; }
        .modal-box input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 10px; color: white; outline: none;
        }
        .modal-box input:focus { border-color: var(--primary); }
        .btn-save {
            width: 100%; padding: 12px; background: var(--primary);
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* Preview Panel */
        #preview-panel {
            position: fixed; top: 0; right: -100%; width: 50%; height: 100%;
            background: white; z-index: 200; transition: 0.5s;
            display: flex; flex-direction: column;
        }
        #preview-panel.active { right: 0; }
        .preview-header { background: #1a1a1a; color: white; padding: 15px; display: flex; justify-content: space-between; }

        .settings-btn {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(255,255,255,0.1); width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .settings-btn:hover { background: var(--primary); color: black; transform: rotate(90deg); }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand"><h1>Sikandar Azam AI</h1></div>
        <div class="history-container" id="historyBox"></div>
        <div class="settings-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <div class="reactor-container">
            <div class="pulse-ring"></div>
            <div class="reactor-core" onclick="startSikandar()">
                <i class="fas fa-microphone fa-2x" style="color: white;"></i>
            </div>
        </div>

        <div id="status" style="margin-top: 20px; color: var(--primary); font-size: 12px; letter-spacing: 2px;">اسٹینڈ بائی</div>

        <div class="response-box" id="output">"جی سر سکندر اعظم، میں حاضر ہوں۔"</div>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <h2>⚙️ سیٹنگز</h2>
            <label>Groq API Key:</label>
            <input type="password" id="apiKeyInput" placeholder="اپنی API Key یہاں ڈالیں">
            
            <label>Model Name:</label>
            <input type="text" id="modelInput" placeholder="مثال: llama3-70b-8192">
            
            <button class="btn-save" onclick="saveSettings()">سیٹنگز محفوظ کریں</button>
            <p onclick="toggleSettings()" style="text-align: center; margin-top: 15px; cursor: pointer; font-size: 12px; color: #ff4444;">بند کریں</p>
        </div>
    </div>

    <!-- Preview Panel -->
    <div id="preview-panel">
        <div class="preview-header">
            <span>لائیو پریویو</span>
            <div>
                <button onclick="downloadCode()" style="background: #22c55e; border:none; padding:5px 10px; border-radius:5px; color:white; cursor:pointer;">ڈاؤن لوڈ</button>
                <button onclick="document.getElementById('preview-panel').classList.remove('active')" style="background: #ef4444; border:none; padding:5px 10px; border-radius:5px; color:white; cursor:pointer;">بند کریں</button>
            </div>
        </div>
        <iframe id="preview-frame" style="flex: 1; border: none;"></iframe>
    </div>

    <script>
        // --- App State ---
        let config = {
            apiKey: localStorage.getItem('sk_api_key') || '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',
            model: localStorage.getItem('sk_model_name') || 'llama3-70b-8192'
        };

        const outputEl = document.getElementById('output');
        const statusEl = document.getElementById('status');
        const previewFrame = document.getElementById('preview-frame');
        let lastGeneratedCode = "";

        // --- Settings Logic ---
        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            document.getElementById('apiKeyInput').value = config.apiKey;
            document.getElementById('modelInput').value = config.model;
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            const newKey = document.getElementById('apiKeyInput').value;
            const newModel = document.getElementById('modelInput').value;
            
            if(newKey && newModel) {
                config.apiKey = newKey;
                config.model = newModel;
                localStorage.setItem('sk_api_key', newKey);
                localStorage.setItem('sk_model_name', newModel);
                alert("سیٹنگز محفوظ ہو گئیں!");
                toggleSettings();
            } else {
                alert("براہ کرم تمام خانے پُر کریں۔");
            }
        }

        // --- Voice Logic ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ur-PK';

        recognition.onstart = () => { statusEl.innerText = "سن رہا ہوں..."; };
        recognition.onend = () => { statusEl.innerText = "اسٹینڈ بائی"; };
        recognition.onresult = (event) => { processCommand(event.results[0][0].transcript); };

        function startSikandar() { recognition.start(); }

        async function processCommand(cmd) {
            outputEl.innerText = `آپ: ${cmd}`;
            
            // Special Functions
            if(cmd.includes('وقت')) { speak(`سر، ابھی وقت ہے ${new Date().toLocaleTimeString('ur-PK')}`); return; }
            if(cmd.includes('تاریخ')) { speak(`سر، آج تاریخ ہے ${new Date().toLocaleDateString('ur-PK')}`); return; }
            
            if(cmd.includes('Play Store') || cmd.includes('پلے اسٹور')) {
                let search = cmd.replace(/پلے اسٹور|پر|ڈھونڈو|سرچ کرو|Play Store|search/g, "").trim();
                speak("سر، پلے اسٹور کھول رہا ہوں...");
                window.open(`https://play.google.com/store/search?q=${encodeURIComponent(search)}&c=apps`);
                return;
            }

            askAI(cmd);
        }

        // --- AI API ---
        async function askAI(prompt) {
            statusEl.innerText = "سوچ رہا ہوں...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [
                            { role: "system", content: "You are Sikandar Azam AI. Respond in Urdu. If code is asked, provide inside ```html block." },
                            { role: "user", content: prompt }
                        ]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const aiReply = data.choices[0].message.content;
                
                if (aiReply.includes("```html")) {
                    lastGeneratedCode = aiReply.match(/```html([\s\S]*?)```/)[1].trim();
                    previewFrame.srcdoc = lastGeneratedCode;
                    document.getElementById('preview-panel').classList.add('active');
                    speak("سر، کوڈ تیار ہے۔ پریویو چیک کریں۔");
                } else {
                    speak(aiReply);
                }
            } catch (error) {
                speak("خرابی: " + error.message);
            } finally {
                statusEl.innerText = "اسٹینڈ بائی";
            }
        }

        function speak(text) {
            outputEl.innerText = text;
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ur-PK';
            window.speechSynthesis.speak(uttr);
        }

        function downloadCode() {
            const blob = new Blob([lastGeneratedCode], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'sikandar_code.html';
            a.click();
        }
    </script>
</body>
</html>
