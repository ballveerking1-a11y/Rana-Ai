<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rana AI - Professional Jarvis Edition</title>
    <style>
        /* ===== ROOT ===== */
        :root {
            --glow-cyan: #00f2ff;
            --glow-purple: #a855f7;
            --glow-pink: #ec4899;
            --deep-blue: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(0, 242, 255, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --shadow-glow: 0 0 40px rgba(0, 242, 255, 0.15);
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--deep-blue);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0, 242, 255, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(236, 72, 153, 0.03) 0%, transparent 40%);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glow-cyan);
            border-radius: 10px;
        }

        /* ===== LAYOUT ===== */
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 16px;
            overflow-y: auto;
            transition: transform var(--transition);
            z-index: 10;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-brand .logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--glow-cyan), var(--glow-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #020617;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.25);
            flex-shrink: 0;
        }

        .sidebar-brand h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--glow-cyan), var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .sidebar-brand .badge {
            font-size: 9px;
            background: rgba(0, 242, 255, 0.15);
            color: var(--glow-cyan);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            -webkit-text-fill-color: var(--glow-cyan);
            margin-left: auto;
        }

        .sidebar-section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.5;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item:hover {
            background: rgba(0, 242, 255, 0.06);
            border-color: rgba(0, 242, 255, 0.15);
            color: var(--text-primary);
        }

        .history-item .time {
            font-size: 9px;
            opacity: 0.4;
            display: block;
            margin-top: 2px;
        }

        .sidebar-footer {
            border-top: 1px solid var(--glass-border);
            padding-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-footer .memory-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .memory-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .sidebar-footer .clear-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: var(--transition);
            width: fit-content;
        }

        .sidebar-footer .clear-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* ===== MAIN ===== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            min-width: 0;
        }

        /* ===== REACTOR ===== */
        .reactor-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reactor-shell {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
        }

        .reactor-shell::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px dashed var(--glow-cyan);
            border-radius: 50%;
            animation: spin 12s linear infinite;
            opacity: 0.3;
        }

        .reactor-shell::after {
            content: '';
            position: absolute;
            inset: -20px;
            border: 1px dashed rgba(168, 85, 247, 0.15);
            border-radius: 50%;
            animation: spin 18s linear infinite reverse;
            opacity: 0.2;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .reactor-shell .ripple-ring {
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            border: 1px solid rgba(0, 242, 255, 0.05);
            animation: ripple-expand 3s ease-out infinite;
        }

        .reactor-shell .ripple-ring:nth-child(2) {
            animation-delay: 1s;
        }
        .reactor-shell .ripple-ring:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes ripple-expand {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .core {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, var(--glow-cyan), #0088cc);
            border-radius: 50%;
            border: 3px solid var(--glow-cyan);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3), inset 0 0 40px rgba(0, 242, 255, 0.2);
            transition: var(--transition);
            position: relative;
            z-index: 2;
        }

        .core::after {
            content: '⚡';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #020617;
            opacity: 0.6;
        }

        .listening .core {
            background: radial-gradient(circle at 30% 30%, var(--glow-pink), #cc0044);
            border-color: var(--glow-pink);
            box-shadow: 0 0 60px rgba(236, 72, 153, 0.5), inset 0 0 40px rgba(236, 72, 153, 0.3);
            animation: pulse-core 0.6s infinite alternate;
        }

        .thinking .core {
            background: radial-gradient(circle at 30% 30%, var(--glow-purple), #7c3aed);
            border-color: var(--glow-purple);
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.5), inset 0 0 40px rgba(168, 85, 247, 0.3);
            animation: pulse-core 0.4s infinite alternate;
        }

        @keyframes pulse-core {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.12);
            }
        }

        .status-text {
            margin-top: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--text-secondary);
            font-weight: 300;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .status-text .highlight {
            color: var(--glow-cyan);
        }

        /* ===== RESPONSE BOX ===== */
        .response-container {
            width: 90%;
            max-width: 560px;
            margin-top: 24px;
            padding: 20px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            text-align: center;
            font-size: 17px;
            line-height: 1.7;
            direction: rtl;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
            transition: var(--transition);
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        .response-container .emotion-tag {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.4;
            letter-spacing: 1px;
        }

        /* ===== QUICK ACTIONS ===== */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-btn {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }

        .quick-btn:hover {
            background: rgba(0, 242, 255, 0.08);
            border-color: var(--glow-cyan);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .quick-btn.primary {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.15), rgba(168, 85, 247, 0.15));
            border-color: var(--glow-cyan);
            color: var(--glow-cyan);
        }

        .quick-btn.primary:hover {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.25), rgba(168, 85, 247, 0.25));
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        /* ===== PREVIEW PANEL ===== */
        #preview-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 50%;
            height: 100vh;
            background: #0a0f1e;
            border-left: 2px solid var(--glow-cyan);
            display: none;
            flex-direction: column;
            z-index: 50;
            box-shadow: -10px 0 60px rgba(0, 0, 0, 0.8);
            animation: slideIn 0.35s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .preview-header {
            background: rgba(2, 6, 23, 0.95);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .preview-header span {
            color: var(--glow-cyan);
            font-size: 12px;
            letter-spacing: 1.5px;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-header .actions {
            display: flex;
            gap: 8px;
        }

        .preview-header button {
            padding: 6px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: var(--transition);
        }

        .preview-header .close-btn {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .preview-header .close-btn:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .preview-header .download-btn {
            background: rgba(0, 242, 255, 0.12);
            color: var(--glow-cyan);
        }

        .preview-header .download-btn:hover {
            background: rgba(0, 242, 255, 0.2);
        }

        .preview-header .apk-btn {
            background: rgba(168, 85, 247, 0.12);
            color: var(--glow-purple);
        }

        .preview-header .apk-btn:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        #preview-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* ===== APK MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-box {
            background: #0f172a;
            padding: 32px;
            border-radius: var(--radius);
            width: 420px;
            max-width: 92vw;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glow);
            animation: scaleUp 0.3s ease;
        }

        @keyframes scaleUp {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-box h3 {
            font-size: 20px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--glow-cyan), var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-box .sub {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .modal-box label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin: 14px 0 4px;
            letter-spacing: 0.5px;
        }

        .modal-box input,
        .modal-box select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            transition: var(--transition);
        }

        .modal-box input:focus,
        .modal-box select:focus {
            outline: none;
            border-color: var(--glow-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.05);
        }

        .modal-box .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .modal-box .btn-row button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-box .btn-row .save-btn {
            background: linear-gradient(135deg, var(--glow-cyan), #0088cc);
            color: #020617;
        }

        .modal-box .btn-row .save-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .modal-box .btn-row .cancel-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        .modal-box .btn-row .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ===== SETTINGS GEAR ===== */
        .settings-gear {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: var(--transition);
            z-index: 20;
            color: var(--text-secondary);
        }

        .settings-gear:hover {
            border-color: var(--glow-cyan);
            color: var(--glow-cyan);
            transform: rotate(60deg);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 820px) {
            .sidebar {
                width: 220px;
                min-width: 220px;
                padding: 16px 12px;
            }
            .sidebar-brand h1 {
                font-size: 16px;
            }
            #preview-panel {
                width: 70%;
            }
            .response-container {
                font-size: 15px;
                padding: 16px 18px;
            }
            .reactor-shell {
                width: 130px;
                height: 130px;
            }
            .core {
                width: 65px;
                height: 65px;
            }
            .core::after {
                font-size: 22px;
            }
        }

        @media (max-width: 600px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                max-height: 180px;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
                padding: 12px 16px;
                flex-shrink: 0;
            }
            .history-list {
                flex-direction: row;
                overflow-x: auto;
                gap: 6px;
                padding-bottom: 4px;
            }
            .history-item {
                white-space: nowrap;
                flex-shrink: 0;
                font-size: 11px;
                padding: 6px 12px;
            }
            .history-item .time {
                display: none;
            }
            .sidebar-brand .badge {
                display: none;
            }
            .sidebar-section-title {
                display: none;
            }
            .sidebar-footer .memory-status {
                font-size: 10px;
            }
            .sidebar-footer .clear-btn {
                font-size: 10px;
                padding: 4px 12px;
            }
            .main-area {
                padding: 16px;
                justify-content: flex-start;
                padding-top: 20px;
            }
            .reactor-shell {
                width: 110px;
                height: 110px;
            }
            .core {
                width: 55px;
                height: 55px;
            }
            .core::after {
                font-size: 18px;
            }
            .response-container {
                font-size: 14px;
                padding: 14px 16px;
                min-height: 60px;
            }
            #preview-panel {
                width: 100%;
                height: 60vh;
                top: auto;
                bottom: 0;
                border-left: none;
                border-top: 2px solid var(--glow-cyan);
            }
            .quick-actions {
                gap: 6px;
            }
            .quick-btn {
                font-size: 10px;
                padding: 6px 14px;
            }
            .settings-gear {
                bottom: 16px;
                left: 16px;
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            .modal-box {
                padding: 24px;
                width: 96vw;
            }
            .modal-box h3 {
                font-size: 17px;
            }
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gap-8 {
            gap: 8px;
        }
        .text-glow {
            text-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
        }
    </style>
</head>
<body>

    <!-- ===== APP LAYOUT ===== -->
    <div class="app-layout">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo">R</div>
                <h1>Rana AI</h1>
                <span class="badge">v3.0</span>
            </div>

            <div class="sidebar-section-title">📜 گفتگو کی تاریخ</div>
            <div class="history-list" id="historyList">
                <div style="color:var(--text-secondary);font-size:12px;opacity:0.4;text-align:center;padding:20px 0;">
                    کوئی تاریخ نہیں
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="memory-status">
                    <span class="memory-dot"></span>
                    <span id="memoryCount">0</span> میموری سلٹس
                    <span style="margin-left:auto;opacity:0.3;">|</span>
                    <span id="historyTime" style="font-size:10px;opacity:0.3;"></span>
                </div>
                <button class="clear-btn" onclick="clearHistory()">🗑️ تاریخ صاف کریں</button>
            </div>
        </aside>

        <!-- ===== MAIN AREA ===== -->
        <main class="main-area">

            <div class="reactor-wrapper">
                <div class="reactor-shell" id="micTrigger" onclick="startRana()">
                    <span class="ripple-ring"></span>
                    <span class="ripple-ring"></span>
                    <span class="ripple-ring"></span>
                    <div class="core"></div>
                </div>
                <div class="status-text" id="status">
                    <span class="highlight">●</span> سسٹم: اسٹینڈ بائی
                </div>
            </div>

            <div class="response-container" id="output">
                <span class="emotion-tag" id="emotionTag">🧠</span>
                "سر، میں آپ کے حکم کا انتظار کر رہا ہوں۔"
            </div>

            <div class="quick-actions">
                <button class="quick-btn" onclick="quickPrompt('آج کا موسم کیسا ہے؟')">🌤️ موسم</button>
                <button class="quick-btn" onclick="quickPrompt('مجھے ایک HTML صفحہ بنا دو')">📄 HTML</button>
                <button class="quick-btn" onclick="quickPrompt('آپ کیسے ہیں؟')">💬 گفتگو</button>
                <button class="quick-btn primary" onclick="quickPrompt('میرا نام کیا ہے؟')">🧑 میموری</button>
            </div>

        </main>
    </div>

    <!-- ===== PREVIEW PANEL ===== -->
    <div id="preview-panel">

    <div class="modal-overlay" id="apkModal">

            <label>📦 پیکیج نام (Package Name)</label>
            <input type="text" id="apkPackage" value="com.rana.ai.app" placeholder="com.yourapp.domain" />

            <label>🎨 تھیم رنگ (Theme Color)</label>

            <div class="btn-row">

                <button class="save-btn" onclick="generateAPK()">⚡ APK بنائیں</button>

            <div id="apkStatus" style="margin-top:14px;font-size:13px;color:var(--text-secondary);text-align:center;"></div>

    <div class="settings-gear" onclick="toggleSettings()" title="سیٹنگز">⚙️</div>

    <!-- ===== SETTINGS MODAL (reuse APK modal style) ===== -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <h3>⚙️ سیٹنگز</h3>
            <p class="sub">اپنی کلید اور ماڈل ترتیب دیں</p>

            <label>🔑 API کلید</label>
            <input type="password" id="settingsApiKey" placeholder="sk-or-..." />

            <label>🧠 ماڈل</label>
            <input type="text" id="settingsModel" value="google/gemma-2-9b-it:free" />

            <label>⚡ جواب کی رفتار</label>
            <select id="settingsSpeed">
                <option value="fast">تیز (Fast)</option>
                <option value="balanced" selected>متوازن (Balanced)</option>
                <option value="detailed">تفصیلی (Detailed)</option>
            </select>

            <div class="btn-row">
                <button class="cancel-btn" onclick="closeSettings()">منسوخ</button>
                <button class="save-btn" onclick="saveSettings()">💾 محفوظ کریں</button>
            </div>
        </div>
    </div>


    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const DEFAULT_KEY = "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";

        let config = {
            key: localStorage.getItem('rana_key') || DEFAULT_KEY,
            model: localStorage.getItem('rana_model') || "google/gemma-2-9b-it:free",
            speed: localStorage.getItem('rana_speed') || "balanced",
            memory: JSON.parse(localStorage.getItem('rana_memory') || '[]'),
            currentHTML: null,
        };

        // ============================================================
        //  DOM REFS
        // ============================================================
        const $ = id => document.getElementById(id);
        const outputEl = $('output');
        const statusEl = $('status');
        const micTrigger = $('micTrigger');
        const previewPanel = $('preview-panel');
        const previewFrame = $('previewFrame');
        const historyList = $('historyList');
        const memoryCount = $('memoryCount');
        const historyTime = $('historyTime');
        const emotionTag = $('emotionTag');

        // ============================================================
        //  SPEECH RECOGNITION
        // ============================================================
        const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';
        recognition.continuous = false;
        recognition.interimResults = false;

        // ============================================================
        //  MEMORY / HISTORY
        // ============================================================
        function saveMemory(entry) {
            config.memory.unshift({
                ...entry,
                time: Date.now()
            });
            if (config.memory.length > 200) config.memory.length = 200;
            localStorage.setItem('rana_memory', JSON.stringify(config.memory));
            renderHistory();
        }

        function renderHistory() {
            const list = historyList;
            if (!config.memory.length) {
                list.innerHTML =
                    `<div style="color:var(--text-secondary);font-size:12px;opacity:0.4;text-align:center;padding:20px 0;">کوئی تاریخ نہیں</div>`;
                memoryCount.textContent = '0';
                historyTime.textContent = '';
                return;
            }
            let html = '';
            config.memory.slice(0, 30).forEach((item, i) => {
                const label = (item.user || '').slice(0, 50) + (item.user?.length > 50 ? '…' : '');
                const time = new Date(item.time).toLocaleTimeString('ur-PK', { hour: '2-digit', minute: '2-digit' });
                html += `<div class="history-item" onclick="loadHistory(${i})">
                            ${label || 'گفتگو'}
                            <span class="time">${time}</span>
                        </div>`;
            });
            list.innerHTML = html;
            memoryCount.textContent = config.memory.length;
            const last = config.memory[0];
            if (last) {
                historyTime.textContent = new Date(last.time).toLocaleTimeString('ur-PK', { hour: '2-digit',
                minute: '2-digit' });
            }
        }

        function loadHistory(index) {
            const item = config.memory[index];
            if (!item) return;
            if (item.ai) {
                outputEl.innerHTML = `<span class="emotion-tag">📜</span> ${item.ai}`;
            }
            // also show user
            if (item.user) {
                // speak it
                speak(item.ai || item.user);
            }
        }

        function clearHistory() {
            if (confirm('کیا آپ واقعی تمام تاریخ حذف کرنا چاہتے ہیں؟')) {
                config.memory = [];
                localStorage.setItem('rana_memory', JSON.stringify(config.memory));
                renderHistory();
                outputEl.innerHTML = `<span class="emotion-tag">🗑️</span> "تاریخ صاف کر دی گئی۔"`;
            }
        }

        // ============================================================
        //  EMOTION ENGINE
        // ============================================================
        function detectEmotion(text) {
            const lower = text.toLowerCase();
            if (lower.includes('شکریہ') || lower.includes('thanks') || lower.includes('thank')) return '🙏';
            if (lower.includes('برا') || lower.includes('خراب') || lower.includes('bad') || lower.includes('sad')) return '😢';
            if (lower.includes('خوش') || lower.includes('happy') || lower.includes('good') || lower.includes('great')) return
            '😊';
            if (lower.includes('مزاق') || lower.includes('joke') || lower.includes('laugh')) return '😂';
            if (lower.includes('غصہ') || lower.includes('angry') || lower.includes('frustrated')) return '😠';
            if (lower.includes('پریشان') || lower.includes('worried') || lower.includes('anxious')) return '😰';
            if (lower.includes('پیار') || lower.includes('love') || lower.includes('محبت')) return '❤️';
            if (lower.includes('سوال') || lower.includes('question') || lower.includes('کیوں')) return '🤔';
            if (lower.includes('واہ') || lower.includes('wow') || lower.includes('amazing')) return '🤩';
            if (lower.includes('ٹھیک') || lower.includes('ok') || lower.includes('theek')) return '👍';
            if (lower.includes('نہیں') || lower.includes('no') || lower.includes('nahi')) return '👎';
            return '🧠';
        }

        function setEmotion(text) {
            const emoji = detectEmotion(text);
            emotionTag.textContent = emoji;
        }

        // ============================================================
        //  SPEAK
        // ============================================================
        function speak(text) {
            const clean = text.replace(/[*#_`]/g, '').trim();
            if (!clean) return;

            // update output
            outputEl.innerHTML = `<span class="emotion-tag">${detectEmotion(clean)}</span> ${clean}`;
            setEmotion(clean);

            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: بول رہا ہے...`;

            const utterance = new SpeechSynthesisUtterance(clean);
            utterance.lang = 'ur-PK';
            utterance.rate = 0.92;
            utterance.pitch = 1.02;

            // try to find urdu/hindi voice
            const voices = window.speechSynthesis.getVoices();
            const urduVoice = voices.find(v => v.lang.includes('ur') || v.lang.includes('hi'));
            if (urduVoice) utterance.voice = urduVoice;

            utterance.onend = () => {
                statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: اسٹینڈ بائی`;
                micTrigger.classList.remove('listening', 'thinking');
            };
            utterance.onerror = () => {
                statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: اسٹینڈ بائی`;
                micTrigger.classList.remove('listening', 'thinking');
            };

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // ============================================================
        //  QUICK PROMPT
        // ============================================================
        function quickPrompt(prompt) {
            outputEl.innerHTML = `<span class="emotion-tag">⏳</span> "سوچ رہا ہوں..."`;
            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: سوچ رہا ہے...`;
            micTrigger.classList.add('thinking');
            askAI(prompt);
        }

        // ============================================================
        //  START RANA (Voice)
        // ============================================================
        function startRana() {
            window.speechSynthesis.cancel();
            try {
                recognition.start();
                micTrigger.classList.add('listening');
                statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: سن رہا ہے...`;
                outputEl.innerHTML = `<span class="emotion-tag">🎤</span> "سن رہا ہوں، بولیں..."`;
            } catch (e) {
                // fallback: if recognition fails, use quick prompt
                quickPrompt('آپ کا پیغام');
            }
        }

        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript.trim();
            micTrigger.classList.remove('listening');
            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: پروسیسنگ...`;

            outputEl.innerHTML = `<span class="emotion-tag">🎤</span> "آپ نے کہا: ${speech}"`;
            setEmotion(speech);

            // Save user input
            saveMemory({ user: speech, ai: '…' });

            // ===== HARDCODED COMMANDS (fast) =====
            const lower = speech.toLowerCase();
            if (lower.includes('open youtube') || lower.includes('یوٹیوب')) {
                window.open('https://youtube.com');
                speak('جی سر، یوٹیوب کھول رہا ہوں۔');
                return;
            }
            if (lower.includes('open whatsapp') || lower.includes('واٹس ایپ')) {
                window.open('https://web.whatsapp.com');
                speak('جی سر، واٹس ایپ کھول رہا ہوں۔');
                return;
            }
            if (lower.includes('open google') || lower.includes('گوگل')) {
                window.open('https://google.com');
                speak('جی سر، گوگل کھول رہا ہوں۔');
                return;
            }
            if (lower.includes('open facebook') || lower.includes('فیس بک')) {
                window.open('https://facebook.com');
                speak('جی سر، فیس بک کھول رہا ہوں۔');
                return;
            }
            if (lower.includes('open instagram') || lower.includes('انسٹاگرام')) {
                window.open('https://instagram.com');
                speak('جی سر، انسٹاگرام کھول رہا ہوں۔');
                return;
            }
            if (lower.includes('open twitter') || lower.includes('ٹویٹر') || lower.includes('x')) {
                window.open('https://x.com');
                speak('جی سر، ٹویٹر کھول رہا ہوں۔');
                return;
            }
            if (lower.includes('waqt') || lower.includes('time') || lower.includes('وقت')) {
                const time = new Date().toLocaleTimeString('ur-PK', { hour: '2-digit', minute: '2-digit',
                    second: '2-digit' });
                speak(`سر، ابھی وقت ہے ${time}`);
                return;
            }
            if (lower.includes('tareekh') || lower.includes('date') || lower.includes('تاریخ')) {
                const date = new Date().toLocaleDateString('ur-PK', { day: 'numeric', month: 'long', year: 'numeric' });
                speak(`سر، آج کی تاریخ ہے ${date}`);
                return;
            }
            if (lower.includes('آپ کا نام') || lower.includes('your name')) {
                speak('میرا نام رانا ہے، میں ایک جدید مصنوعی ذہانت ہوں۔');
                return;
            }
            if (lower.includes('آپ کیسے ہیں') || lower.includes('how are you')) {
                speak('میں ٹھیک ہوں، آپ کا شکریہ! آپ کیسے ہیں؟');
                return;
            }
            if (lower.includes('میرا نام') || lower.includes('my name is')) {
                const nameMatch = speech.match(/میرا نام ([\s\S]+?)(\s|$|\.)/i) || speech.match(/my name is ([\s\S]+?)(\s|$|\.)/i);
                if (nameMatch) {
                    const name = nameMatch[1].trim();
                    saveMemory({ user: `میرا نام ${name} ہے`, ai: `آپ کا نام ${name} ہے، میں یاد رکھوں گا۔` });
                    speak(`آپ کا نام ${name} ہے، میں یاد رکھوں گا۔`);
                    return;
                }
            }

            // ===== AI =====
            await askAI(speech);
        };

        recognition.onerror = () => {
            micTrigger.classList.remove('listening', 'thinking');
            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: اسٹینڈ بائی`;
            // if error, show quick fallback
            if (!outputEl.innerHTML.includes('سن رہا ہوں')) {
                // ignore
            }
        };

        recognition.onend = () => {
            // if still listening class but no result, clean up
            setTimeout(() => {
                micTrigger.classList.remove('listening', 'thinking');
                if (!window.speechSynthesis.speaking) {
                    statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: اسٹینڈ بائی`;
                }
            }, 300);
        };

        // ============================================================
        //  ASK AI
        // ============================================================
        async function askAI(prompt) {
            micTrigger.classList.add('thinking');
            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: سوچ رہا ہے...`;

            // Check memory for similar question (fast cache)
            const cached = config.memory.find(m =>
                m.user && m.user.toLowerCase().includes(prompt.toLowerCase().slice(0, 20))
            );
            if (cached && cached.ai && cached.ai !== '…') {
                // use cached response with a twist
                speak(cached.ai + ' (یاد سے)');
                micTrigger.classList.remove('thinking');
                return;
            }

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": config.model,
                        "messages": [{
                            "role": "system",
                            "content": `آپ رانا ہیں، ایک جدید مصنوعی ذہانت۔ آپ جذباتی، مددگار اور پیشہ ور ہیں۔
                                - ہمیشہ اردو میں جواب دیں۔
                                - اگر صارف کوڈ مانگے تو مکمل HTML/CSS/JS کوڈ \`\`\`html ... \`\`\` بلاک میں دیں۔
                                - مختصر اور مؤثر جواب دیں۔
                                - جذبات دکھائیں — خوشی، اداسی، حیرت، وغیرہ۔
                                - صارف کا نام یاد رکھیں اگر وہ بتائے۔
                                - اگر صارف اپنا نام بتائے تو اسے یاد رکھیں اور اگلی بار نام لے کر مخاطب کریں۔
                                - اگر کوئی ایپ کھولنے کو کہے تو بتائیں کہ میں کھول سکتا ہوں۔
                                - APK بنانے کے لیے رہنمائی کریں۔
                                - جواب میں ایموجی استعمال کریں۔
                                - جواب 2-3 لائنوں سے زیادہ نہ ہو (سوائے کوڈ کے)۔
                                - اگر کوڈ ہو تو اسے \`\`\`html\`\`\` میں دیں اور مختصر وضاحت کریں۔`
                        }, {
                            "role": "user",
                            "content": prompt
                        }]
                    })
                });

                const data = await response.json();
                const aiReply = data.choices?.[0]?.message?.content || 'معذرت، جواب نہیں مل سکا۔';

                // Process response (extract code, speak, etc.)
                processResponse(aiReply, prompt);

            } catch (err) {
                console.error(err);
                speak('معذرت سر، سسٹم میں خرابی ہے۔ براہ کرم دوبارہ کوشش کریں۔');
                micTrigger.classList.remove('thinking');
            }
        }

        // ============================================================
        //  PROCESS RESPONSE
        // ============================================================
        function processResponse(text, userPrompt) {
            micTrigger.classList.remove('thinking');

            // Extract code
            const codeMatch = text.match(/```html([\s\S]*?)```/);
            let speechText = text;

            if (codeMatch) {
                const code = codeMatch[1].trim();
                config.currentHTML = code;

                // Remove code from speech
                speechText = text.replace(/```html[\s\S]*?```/g, '').trim() ||
                    'میں نے کوڈ تیار کر دیا ہے، آپ پریویو دیکھ سکتے ہیں۔';

                // Show Preview
                previewPanel.style.display = 'flex';
                previewFrame.srcdoc = code;

                // update file name
                const nameMatch = userPrompt?.match(/نام ([\s\S]+?)(\s|$|\.)/i) || userPrompt?.match(/name ([\s\S]+?)(\s|$|\.)/i);
                if (nameMatch) {
                    $('previewFileName').textContent = nameMatch[1].trim() + '.html';
                } else {
                    $('previewFileName').textContent = 'index.html';
                }
            } else {
                // no code, close preview if open
                // but don't close if user wants to keep
            }

            // Save to memory
            saveMemory({ user: userPrompt || '…', ai: speechText });

            // Speak
            speak(speechText);
        }

        // ============================================================
        //  DOWNLOAD HTML
        // ============================================================
        function downloadHTML() {
            const code = config.currentHTML;
            if (!code) {
                alert('کوئی HTML کوڈ نہیں ملا۔ پہلے کوڈ جنریٹ کروائیں۔');
                return;
            }
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const fileName = $('previewFileName').textContent || 'index.html';
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            speak('فائل ڈاؤن لوڈ ہو رہی ہے۔');
        }

        function closePreview() {
            previewPanel.style.display = 'none';
        }

        // ============================================================
        //  APK GENERATOR
        // ============================================================
        function openAPKModal() {
            $('apkModal').classList.add('active');
            $('apkStatus').textContent = '';
        }

        function closeAPKModal() {
            $('apkModal').classList.remove('active');
        }

        function generateAPK() {
            const packageName = $('apkPackage').value.trim() || 'com.rana.ai.app';
            const appName = $('apkName').value.trim() || 'Rana AI';
            const themeColor = $('apkTheme').value.trim() || '#00f2ff';

            const code = config.currentHTML || `
                        <!DOCTYPE html>
                        <html>
                        <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
                        <title>${appName}</title>
                        <style>body{background:#020617;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;text-align:center;padding:20px;}
                        .card{background:rgba(15,23,42,0.8);padding:40px;border-radius:20px;border:1px solid ${themeColor};box-shadow:0 0 40px ${themeColor}33;}
                        h1{color:${themeColor};}</style>
                        </head>
                        <body>
                        <div class="card"><h1>🤖 ${appName}</h1><p>رانا AI — آپ کا ذاتی معاون</p><p style="color:#94a3b8;font-size:14px;">v3.0 • ${packageName}</p></div>
                        </body>
                        </html>
                    `;

            // Build PWA manifest
            const manifest = {
                name: appName,
                short_name: appName,
                start_url: '/',
                display: 'standalone',
                background_color: '#020617',
                theme_color: themeColor,
                icons: [{
                    src: 'icon-192.png',
                    sizes: '192x192',
                    type: 'image/png'
                }, {
                    src: 'icon-512.png',
                    sizes: '512x512',
                    type: 'image/png'
                }]
            };

            // Create a zip-like structure for PWA
            const files = {
                'index.html': code,
                'manifest.json': JSON.stringify(manifest, null, 2),
                'sw.js': `
                            self.addEventListener('install', e => e.waitUntil(caches.open('rana-v1').then(c => c.addAll(['/','index.html','manifest.json'])));
                            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
                        `
            };

            // For simplicity: generate a downloadable HTML with PWA meta tags
            const pwaHTML = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                            <title>${appName}</title>
                            <meta name="theme-color" content="${themeColor}">
                            <meta name="apple-mobile-web-app-capable" content="yes">
                            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
                            <link rel="manifest" href="data:application/json;base64,${btoa(JSON.stringify(manifest))}">
                            <style>
                                body{background:#020617;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;text-align:center;padding:20px;margin:0;}
                                .card{background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);padding:40px;border-radius:20px;border:1px solid ${themeColor};box-shadow:0 0 60px ${themeColor}22;max-width:400px;}
                                h1{color:${themeColor};font-size:28px;margin:0 0 8px;}
                                .sub{color:#94a3b8;font-size:14px;margin:6px 0;}
                                .badge{display:inline-block;background:${themeColor}22;color:${themeColor};padding:4px 16px;border-radius:20px;font-size:11px;border:1px solid ${themeColor}33;margin-top:12px;}
                                .icon{font-size:48px;display:block;margin-bottom:8px;}
                                .foot{color:#475569;font-size:11px;margin-top:16px;}
                            </style>
                        </head>
                        <body>
                            <div class="card">
                                <span class="icon">🤖</span>
                                <h1>${appName}</h1>
                                <p class="sub">رانا AI — آپ کا ذاتی معاون</p>
                                <div class="badge">📦 ${packageName}</div>
                                <div class="foot">PWA • ${new Date().toLocaleDateString()}</div>
                            </div>
                            <script>
                                if('serviceWorker' in navigator){
                                    navigator.serviceWorker.register('data:text/javascript;base64,${btoa(`
                                        self.addEventListener('install', e => e.waitUntil(caches.open('rana-v1').then(c => c.addAll(['/'])));
                                        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
                                    `)}');
                                }
                            <\/script>
                        </body>
                        </html>
                    `;

            // Download the PWA HTML
            const blob = new Blob([pwaHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${appName.replace(/\s/g,'_')}_pwa.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            $('apkStatus').textContent = `✅ PWA فائل تیار! اسے Chrome میں کھولیں اور "Add to Home Screen" کریں۔`;
            $('apkStatus').style.color = '#22c55e';

            speak('APK کی تیاری مکمل۔ PWA فائل ڈاؤن لوڈ ہو گئی۔');

            // Also show instructions
            setTimeout(() => {
                $('apkStatus').textContent +=
                    ' 📱 پھر PWA کو APK میں تبدیل کرنے کے لیے "PWA2APK" یا "Bubblewrap" استعمال کریں۔';
            }, 3000);
        }

        // ============================================================
        //  SETTINGS
        // ============================================================
        function toggleSettings() {
            const modal = $('settingsModal');
            modal.classList.toggle('active');
            if (modal.classList.contains('active')) {
                $('settingsApiKey').value = config.key;
                $('settingsModel').value = config.model;
                $('settingsSpeed').value = config.speed || 'balanced';
            }
        }

        function closeSettings() {
            $('settingsModal').classList.remove('active');
        }

        function saveSettings() {
            config.key = $('settingsApiKey').value.trim() || DEFAULT_KEY;
            config.model = $('settingsModel').value.trim() || "google/gemma-2-9b-it:free";
            config.speed = $('settingsSpeed').value || 'balanced';

            localStorage.setItem('rana_key', config.key);
            localStorage.setItem('rana_model', config.model);
            localStorage.setItem('rana_speed', config.speed);

            closeSettings();
            speak('سیٹنگز محفوظ کر لی گئیں۔');
        }

        // ============================================================
        //  CLOSE MODALS ON OVERLAY CLICK
        // ============================================================
        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target === el) {
                    el.classList.remove('active');
                }
            });
        });

        // ============================================================
        //  KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && !e.repeat && !e.target.matches('input, textarea, select')) {
                e.preventDefault();
                startRana();
            }
            if (e.key === 'Escape') {
                closePreview();
                document.querySelectorAll('.modal-overlay.active').forEach(el => el.classList.remove('active'));
            }
            if (e.key === 'd' && e.ctrlKey) {
                e.preventDefault();
                if (config.currentHTML) downloadHTML();
            }
        });

        // ============================================================
        //  INIT
        // ============================================================
        renderHistory();

        // Load voices
        window.speechSynthesis.onvoiceschanged = () => {
            console.log('✅ Voices ready');
        };

        // Welcome
        setTimeout(() => {
            const hasMemory = config.memory.length > 0;
            if (!hasMemory) {
                speak('سر، رانا تیار ہوں۔ کیا حکم ہے؟');
            } else {
                const last = config.memory[0];
                if (last && last.ai) {
                    // just show status
                    statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: اسٹینڈ بائی (${config.memory.length} یاداشتیں)`;
                }
            }
        }, 800);

        console.log('🚀 Rana AI v3.0 loaded');
        console.log('📦 Memory:', config.memory.length, 'items');
        console.log('🔑 Key:', config.key ? '✅ Set' : '❌ Missing');
        console.log('🧠 Model:', config.model);
        console.log('⚡ Speed:', config.speed);
        console.log('🎤 Press SPACE to talk');
    </script>
</body>
</html>
