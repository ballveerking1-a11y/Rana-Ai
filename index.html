<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sikandar Azam AI — Rana v4.0</title>
    <style>
        /* ============================================================
               ROOT & RESET
            ============================================================ */
        :root {
            --glow-cyan: #00f2ff;
            --glow-purple: #a855f7;
            --glow-pink: #ec4899;
            --glow-gold: #fbbf24;
            --deep-blue: #020617;
            --card-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(0, 242, 255, 0.12);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --shadow-glow: 0 0 60px rgba(0, 242, 255, 0.08);
            --radius: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--deep-blue);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(ellipse at 10% 30%, rgba(0, 242, 255, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 70%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(236, 72, 153, 0.02) 0%, transparent 40%);
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glow-cyan);
            border-radius: 10px;
        }

        /* ============================================================
               LAYOUT
            ============================================================ */
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ============================================================
               SIDEBAR
            ============================================================ */
        .sidebar {
            width: 270px;
            min-width: 270px;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 12px;
            overflow-y: auto;
            z-index: 10;
            transition: transform var(--transition);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-brand .logo {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--glow-cyan), var(--glow-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #020617;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            flex-shrink: 0;
        }

        .sidebar-brand h1 {
            font-size: 19px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--glow-cyan), var(--glow-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .sidebar-brand .badge {
            font-size: 8px;
            background: rgba(0, 242, 255, 0.12);
            color: var(--glow-cyan);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.15);
            -webkit-text-fill-color: var(--glow-cyan);
            margin-left: auto;
            white-space: nowrap;
        }

        .sidebar-section-title {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-top: 4px;
            opacity: 0.4;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 60px;
        }

        .history-item {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item:hover {
            background: rgba(0, 242, 255, 0.05);
            border-color: rgba(0, 242, 255, 0.1);
            color: var(--text-primary);
        }

        .history-item .time {
            font-size: 8px;
            opacity: 0.3;
            display: block;
            margin-top: 2px;
        }

        .sidebar-footer {
            border-top: 1px solid var(--glass-border);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-footer .memory-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .memory-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }

        .sidebar-footer .clear-btn {
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
            transition: var(--transition);
            width: fit-content;
        }

        .sidebar-footer .clear-btn:hover {
            background: rgba(239, 68, 68, 0.18);
        }

        /* ============================================================
               MAIN AREA
            ============================================================ */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 24px;
            position: relative;
            min-width: 0;
        }

        /* ============================================================
               REACTOR
            ============================================================ */
        .reactor-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reactor-shell {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
        }

        .reactor-shell::before {
            content: '';
            position: absolute;
            inset: -8px;
            border: 1px dashed var(--glow-cyan);
            border-radius: 50%;
            animation: spin 14s linear infinite;
            opacity: 0.15;
        }

        .reactor-shell::after {
            content: '';
            position: absolute;
            inset: -18px;
            border: 1px dashed rgba(168, 85, 247, 0.1);
            border-radius: 50%;
            animation: spin 22s linear infinite reverse;
            opacity: 0.1;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .reactor-shell .ripple-ring {
            position: absolute;
            inset: -28px;
            border-radius: 50%;
            border: 1px solid rgba(0, 242, 255, 0.03);
            animation: ripple-expand 3.5s ease-out infinite;
        }
        .reactor-shell .ripple-ring:nth-child(2) {
            animation-delay: 1.2s;
        }
        .reactor-shell .ripple-ring:nth-child(3) {
            animation-delay: 2.4s;
        }

        @keyframes ripple-expand {
            0% {
                transform: scale(0.7);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .core {
            width: 74px;
            height: 74px;
            background: radial-gradient(circle at 30% 30%, var(--glow-cyan), #0088cc);
            border-radius: 50%;
            border: 3px solid var(--glow-cyan);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.25), inset 0 0 40px rgba(0, 242, 255, 0.15);
            transition: var(--transition);
            position: relative;
            z-index: 2;
        }

        .core::after {
            content: '⚡';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #020617;
            opacity: 0.5;
        }

        .listening .core {
            background: radial-gradient(circle at 30% 30%, var(--glow-pink), #cc0044);
            border-color: var(--glow-pink);
            box-shadow: 0 0 60px rgba(236, 72, 153, 0.4), inset 0 0 40px rgba(236, 72, 153, 0.2);
            animation: pulse-core 0.5s infinite alternate;
        }

        .thinking .core {
            background: radial-gradient(circle at 30% 30%, var(--glow-purple), #7c3aed);
            border-color: var(--glow-purple);
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.4), inset 0 0 40px rgba(168, 85, 247, 0.2);
            animation: pulse-core 0.35s infinite alternate;
        }

        @keyframes pulse-core {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.1);
            }
        }

        .status-text {
            margin-top: 16px;
            font-size: 11px;
            letter-spacing: 1.8px;
            color: var(--text-secondary);
            font-weight: 300;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .status-text .highlight {
            color: var(--glow-cyan);
        }

        /* ============================================================
               RESPONSE BOX
            ============================================================ */
        .response-container {
            width: 92%;
            max-width: 580px;
            margin-top: 20px;
            padding: 18px 22px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            text-align: center;
            font-size: 16px;
            line-height: 1.6;
            direction: rtl;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
            transition: var(--transition);
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        .response-container .emotion-tag {
            position: absolute;
            top: 6px;
            left: 12px;
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.3;
            letter-spacing: 1px;
        }

        /* ============================================================
               QUICK ACTIONS
            ============================================================ */
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-btn {
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: rgba(0, 242, 255, 0.06);
            border-color: var(--glow-cyan);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .quick-btn.primary {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.12), rgba(168, 85, 247, 0.12));
            border-color: var(--glow-cyan);
            color: var(--glow-cyan);
        }

        .quick-btn.primary:hover {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.2), rgba(168, 85, 247, 0.2));
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.06);
        }

        /* ============================================================
               PREVIEW PANEL
            ============================================================ */
        #preview-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 52%;
            height: 100vh;
            background: #080d1a;
            border-left: 2px solid var(--glow-cyan);
            display: none;
            flex-direction: column;
            z-index: 50;
            box-shadow: -10px 0 80px rgba(0, 0, 0, 0.7);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .preview-header {
            background: rgba(2, 6, 23, 0.95);
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 6px;
        }

        .preview-header span {
            color: var(--glow-cyan);
            font-size: 11px;
            letter-spacing: 1px;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-header .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .preview-header button {
            padding: 5px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 10px;
            font-weight: 500;
            transition: var(--transition);
        }

        .preview-header .close-btn {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
        }
        .preview-header .close-btn:hover {
            background: rgba(239, 68, 68, 0.22);
        }
        .preview-header .download-btn {
            background: rgba(0, 242, 255, 0.1);
            color: var(--glow-cyan);
        }
        .preview-header .download-btn:hover {
            background: rgba(0, 242, 255, 0.2);
        }
        .preview-header .apk-btn {
            background: rgba(168, 85, 247, 0.1);
            color: var(--glow-purple);
        }
        .preview-header .apk-btn:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        #preview-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* ============================================================
               MODALS
            ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(14px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-box {
            background: #0f172a;
            padding: 28px 32px;
            border-radius: var(--radius);
            width: 440px;
            max-width: 94vw;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glow);
            animation: scaleUp 0.25s ease;
        }

        @keyframes scaleUp {
            from {
                transform: scale(0.92);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-box h3 {
            font-size: 19px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--glow-cyan), var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-box .sub {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 18px;
        }

        .modal-box label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin: 12px 0 4px;
            letter-spacing: 0.3px;
        }

        .modal-box input,
        .modal-box select {
            width: 100%;
            padding: 9px 14px;
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 13px;
            transition: var(--transition);
        }

        .modal-box input:focus,
        .modal-box select:focus {
            outline: none;
            border-color: var(--glow-cyan);
            box-shadow: 0 0 24px rgba(0, 242, 255, 0.04);
        }

        .modal-box .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-box .btn-row button {
            flex: 1;
            padding: 9px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-box .btn-row .save-btn {
            background: linear-gradient(135deg, var(--glow-cyan), #0088cc);
            color: #020617;
        }

        .modal-box .btn-row .save-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .modal-box .btn-row .cancel-btn {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
        }

        .modal-box .btn-row .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* ============================================================
               SETTINGS GEAR
            ============================================================ */
        .settings-gear {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
            z-index: 20;
            color: var(--text-secondary);
        }

        .settings-gear:hover {
            border-color: var(--glow-cyan);
            color: var(--glow-cyan);
            transform: rotate(60deg);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.06);
        }

        /* ============================================================
               RESPONSIVE
            ============================================================ */
        @media (max-width: 820px) {
            .sidebar {
                width: 210px;
                min-width: 210px;
                padding: 14px 10px;
            }
            .sidebar-brand h1 {
                font-size: 15px;
            }
            #preview-panel {
                width: 70%;
            }
            .response-container {
                font-size: 14px;
                padding: 14px 16px;
            }
            .reactor-shell {
                width: 130px;
                height: 130px;
            }
            .core {
                width: 64px;
                height: 64px;
            }
            .core::after {
                font-size: 22px;
            }
        }

        @media (max-width: 600px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                max-height: 160px;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
                padding: 10px 14px;
                flex-shrink: 0;
            }
            .history-list {
                flex-direction: row;
                overflow-x: auto;
                gap: 4px;
                padding-bottom: 4px;
                min-height: 36px;
            }
            .history-item {
                white-space: nowrap;
                flex-shrink: 0;
                font-size: 10px;
                padding: 4px 12px;
            }
            .history-item .time {
                display: none;
            }
            .sidebar-brand .badge {
                display: none;
            }
            .sidebar-section-title {
                display: none;
            }
            .sidebar-footer .memory-status {
                font-size: 9px;
            }
            .sidebar-footer .clear-btn {
                font-size: 9px;
                padding: 3px 10px;
            }
            .main-area {
                padding: 14px;
                justify-content: flex-start;
                padding-top: 16px;
            }
            .reactor-shell {
                width: 100px;
                height: 100px;
            }
            .core {
                width: 50px;
                height: 50px;
            }
            .core::after {
                font-size: 16px;
            }
            .response-container {
                font-size: 13px;
                padding: 12px 14px;
                min-height: 56px;
            }
            #preview-panel {
                width: 100%;
                height: 55vh;
                top: auto;
                bottom: 0;
                border-left: none;
                border-top: 2px solid var(--glow-cyan);
            }
            .quick-actions {
                gap: 4px;
            }
            .quick-btn {
                font-size: 9px;
                padding: 4px 12px;
            }
            .settings-gear {
                bottom: 12px;
                left: 12px;
                width: 36px;
                height: 36px;
                font-size: 15px;
            }
            .modal-box {
                padding: 20px;
                width: 96vw;
            }
            .modal-box h3 {
                font-size: 16px;
            }
        }

        /* ============================================================
               UTILITIES
            ============================================================ */
        .hidden {
            display: none !important;
        }
        .text-glow {
            text-shadow: 0 0 40px rgba(0, 242, 255, 0.08);
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gap-8 {
            gap: 8px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .text-xs {
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <!-- ============================================================
    APP LAYOUT
    ============================================================ -->
    <div class="app-layout">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo">S</div>
                <h1>Sikandar Azam</h1>
                <span class="badge">v4.0</span>
            </div>

            <div class="sidebar-section-title">📜 گفتگو کی تاریخ</div>
            <div class="history-list" id="historyList">
                <div style="color:var(--text-secondary);font-size:11px;opacity:0.3;text-align:center;padding:16px 0;">
                    کوئی تاریخ نہیں
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="memory-status">
                    <span class="memory-dot"></span>
                    <span id="memoryCount">0</span> میموری
                    <span style="margin-left:auto;opacity:0.2;">|</span>
                    <span id="historyTime" style="font-size:9px;opacity:0.3;"></span>
                </div>
                <button class="clear-btn" onclick="clearHistory()">🗑️ صاف کریں</button>
            </div>
        </aside>

        <!-- ===== MAIN AREA ===== -->
        <main class="main-area">

            <div class="reactor-wrapper">
                <div class="reactor-shell" id="micTrigger" onclick="startRana()">
                    <span class="ripple-ring"></span>
                    <span class="ripple-ring"></span>
                    <span class="ripple-ring"></span>
                    <div class="core"></div>
                </div>
                <div class="status-text" id="status">
                    <span class="highlight">●</span> سسٹم: اسٹینڈ بائی
                </div>
            </div>

            <div class="response-container" id="output">
                <span class="emotion-tag" id="emotionTag">🧠</span>
                "سر سکندر اعظم، میں حاضر ہوں۔"
            </div>

    <!-- ============================================================

    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const DEFAULT_KEY = "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";

        let config = {
            key: localStorage.getItem('rana_key') || DEFAULT_KEY,
            model: localStorage.getItem('rana_model') || "google/gemma-2-9b-it:free",
            speed: localStorage.getItem('rana_speed') || "balanced",
            memory: JSON.parse(localStorage.getItem('rana_memory') || '[]'),
            currentHTML: null,
            weatherCache: null,
            weatherCacheTime: 0,
        };

        // ============================================================
        //  DOM REFS
        // ============================================================
        const $ = id => document.getElementById(id);
        const outputEl = $('output');
        const statusEl = $('status');
        const micTrigger = $('micTrigger');
        const previewPanel = $('preview-panel');
        const previewFrame = $('previewFrame');
        const historyList = $('historyList');
        const memoryCount = $('memoryCount');
        const historyTime = $('historyTime');
        const emotionTag = $('emotionTag');

        // ============================================================
        //  SPEECH RECOGNITION
        // ============================================================
        const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // ============================================================
        //  MEMORY / HISTORY
        // ============================================================
        function saveMemory(entry) {
            config.memory.unshift({
                ...entry,
                time: Date.now()
            });
            if (config.memory.length > 300) config.memory.length = 300;
            localStorage.setItem('rana_memory', JSON.stringify(config.memory));
            renderHistory();
        }

        function renderHistory() {
            const list = historyList;
            if (!config.memory.length) {
                list.innerHTML =
                    `<div style="color:var(--text-secondary);font-size:11px;opacity:0.3;text-align:center;padding:16px 0;">کوئی تاریخ نہیں</div>`;
                memoryCount.textContent = '0';
                historyTime.textContent = '';
                return;
            }
            let html = '';
            config.memory.slice(0, 30).forEach((item, i) => {
                const label = (item.user || '').slice(0, 45) + (item.user?.length > 45 ? '…' : '');
                const time = new Date(item.time).toLocaleTimeString('ur-PK', { hour: '2-digit', minute: '2-digit' });
                html += `<div class="history-item" onclick="loadHistory(${i})">
                            ${label || 'گفتگو'}
                            <span class="time">${time}</span>
                        </div>`;
            });
            list.innerHTML = html;
            memoryCount.textContent = config.memory.length;
            const last = config.memory[0];
            if (last) {
                historyTime.textContent = new Date(last.time).toLocaleTimeString('ur-PK', { hour: '2-digit',
                minute: '2-digit' });
            }
        }

        function loadHistory(index) {
            const item = config.memory[index];
            if (!item) return;
            if (item.ai) {
                outputEl.innerHTML = `<span class="emotion-tag">📜</span> ${item.ai}`;
                setEmotion(item.ai);
            }
            if (item.ai) speak(item.ai);
        }

        function clearHistory() {
            if (confirm('کیا آپ تمام تاریخ حذف کرنا چاہتے ہیں؟')) {
                config.memory = [];
                localStorage.setItem('rana_memory', JSON.stringify(config.memory));
                renderHistory();
                outputEl.innerHTML = `<span class="emotion-tag">🗑️</span> "تاریخ صاف کر دی گئی۔"`;
                setEmotion('تاریخ صاف');
            }
        }

        // ============================================================
        //  EMOTION ENGINE
        // ============================================================
        function detectEmotion(text) {
            const l = text.toLowerCase();
            if (l.includes('شکریہ') || l.includes('thanks') || l.includes('thank')) return '🙏';
            if (l.includes('برا') || l.includes('خراب') || l.includes('bad') || l.includes('sad')) return '😢';
            if (l.includes('خوش') || l.includes('happy') || l.includes('good') || l.includes('great')) return '😊';
            if (l.includes('مزاق') || l.includes('joke') || l.includes('laugh')) return '😂';
            if (l.includes('غصہ') || l.includes('angry') || l.includes('frustrated')) return '😠';
            if (l.includes('پریشان') || l.includes('worried') || l.includes('anxious')) return '😰';
            if (l.includes('پیار') || l.includes('love') || l.includes('محبت')) return '❤️';
            if (l.includes('سوال') || l.includes('question') || l.includes('کیوں')) return '🤔';
            if (l.includes('واہ') || l.includes('wow') || l.includes('amazing')) return '🤩';
            if (l.includes('ٹھیک') || l.includes('ok') || l.includes('theek')) return '👍';
            if (l.includes('نہیں') || l.includes('no') || l.includes('nahi')) return '👎';
            if (l.includes('سکندر') || l.includes('sikandar') || l.includes('azam')) return '👑';
            if (l.includes('موسم') || l.includes('weather')) return '🌤️';
            if (l.includes('گیم') || l.includes('game')) return '🎮';
            return '🧠';
        }

        function setEmotion(text) {
            emotionTag.textContent = detectEmotion(text);
        }

        // ============================================================
        //  SPEAK (FAST)
        // ============================================================
        function speak(text) {
            const clean = text.replace(/[*#_`]/g, '').trim();
            if (!clean) return;

            // Update output
            outputEl.innerHTML = `<span class="emotion-tag">${detectEmotion(clean)}</span> ${clean}`;
            setEmotion(clean);

            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: بول رہا ہے...`;

            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(clean);
            utterance.lang = 'ur-PK';
            utterance.rate = 0.95;
            utterance.pitch = 1.05;

            // Find Urdu/Hindi voice
            const voices = window.speechSynthesis.getVoices();
            const urduVoice = voices.find(v => v.lang.includes('ur') || v.lang.includes('hi'));
            if (urduVoice) utterance.voice = urduVoice;

            utterance.onend = () => {
                statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: اسٹینڈ بائی`;
                micTrigger.classList.remove('listening', 'thinking');
            };
            utterance.onerror = () => {
                statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: اسٹینڈ بائی`;
                micTrigger.classList.remove('listening', 'thinking');
            };

            window.speechSynthesis.speak(utterance);
        }

        // ============================================================
        //  QUICK PROMPT
        // ============================================================
        function quickPrompt(prompt) {
            outputEl.innerHTML = `<span class="emotion-tag">⏳</span> "سوچ رہا ہوں..."`;
            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: سوچ رہا ہے...`;
            micTrigger.classList.add('thinking');
            askAI(prompt);
        }

        // ============================================================
        //  START RANA (Voice)
        // ============================================================
        function startRana() {
            window.speechSynthesis.cancel();
            try {
                recognition.start();
                micTrigger.classList.add('listening');
                statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: سن رہا ہے...`;
                outputEl.innerHTML = `<span class="emotion-tag">🎤</span> "سن رہا ہوں، بولیں..."`;
            } catch (e) {
                quickPrompt('آپ کا پیغام');
            }
        }

        // ============================================================
        //  RECOGNITION RESULT
        // ============================================================
        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript.trim();
            micTrigger.classList.remove('listening');
            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: پروسیسنگ...`;

            outputEl.innerHTML = `<span class="emotion-tag">🎤</span> "آپ نے کہا: ${speech}"`;
            setEmotion(speech);
            saveMemory({ user: speech, ai: '…' });

            const lower = speech.toLowerCase();

            // ===== FAST LOCAL COMMANDS =====

            // --- App Opening by Name / Package ---
            const appMatch = lower.match(/(?:open|کھول)\s+([\s\S]+?)(?:\s+میں\s+search|\s+search\s+|\s+میں\s+ڈھونڈ|\s*$)/i);
            if (appMatch) {
                const query = appMatch[1].trim();
                // Check if it's a search command within an app
                const searchMatch = lower.match(/search\s+([\s\S]+?)\s+in\s+([\s\S]+)/i) ||
                    lower.match(/([\s\S]+?)\s+(?:search|ڈھونڈ)\s+میں\s+([\s\S]+)/i);
                if (searchMatch) {
                    const searchTerm = searchMatch[1].trim();
                    const appName = searchMatch[2].trim();
                    handleAppSearch(appName, searchTerm);
                    return;
                }
                // Pure app opening
                handleAppOpen(query);
                return;
            }

            // --- Play Store specific ---
            if (lower.includes('play store') && (lower.includes('search') || lower.includes('ڈھونڈ'))) {
                const match = lower.match(/(?:search|ڈھونڈ)\s+([\s\S]+?)\s+(?:in|میں|on|پر)/i) ||
                    lower.match(/([\s\S]+?)\s+(?:game|app|ایپ|گیم)\s+(?:search|ڈھونڈ)/i);
                if (match) {
                    const term = match[1].trim();
                    handleAppSearch('play store', term);
                    return;
                }
            }

            // --- Peshawar Weather, Time, Date ---
            if (lower.includes('موسم') || lower.includes('weather') || lower.includes('پشاور')) {
                getPeshawarWeather().then(w => {
                    speak(w);
                });
                return;
            }
            if (lower.includes('waqt') || lower.includes('time') || lower.includes('وقت') || lower.includes('پشاور')) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ur-PK', { hour: '2-digit', minute: '2-digit',
                    second: '2-digit', timeZone: 'Asia/Karachi' });
                speak(`سر، پشاور میں ابھی وقت ہے ${timeStr}`);
                return;
            }
            if (lower.includes('tareekh') || lower.includes('date') || lower.includes('تاریخ') || lower.includes('پشاور')) {
                const now = new Date();
                const dateStr = now.toLocaleDateString('ur-PK', { day: 'numeric', month: 'long', year: 'numeric',
                    timeZone: 'Asia/Karachi' });
                speak(`سر، پشاور کی تاریخ ہے ${dateStr}`);
                return;
            }

            // --- Name: Sikandar Azam Sir ---
            if (lower.includes('سکندر') || lower.includes('sikandar') || lower.includes('azam') || lower.includes('سکندر اعظم')) {
                speak('جی سر سکندر اعظم، میں حاضر ہوں۔ آپ کا حکم؟');
                return;
            }

            // --- Game generation ---
            if (lower.includes('گیم') || lower.includes('game') || lower.includes('بنا') && lower.includes('گیم')) {
                // Let AI handle it but with English prompt
                await askAI('Create a fun HTML game in ENGLISH language. The game should be a complete HTML file with CSS and JavaScript. All text, labels, and messages in the game must be in English. Make it interactive and visually appealing.');
                return;
            }

            // --- Default: AI ---
            await askAI(speech);
        };

        // ============================================================
        //  APP HANDLING
        // ============================================================
        const APP_MAP = {
            'play store': 'com.android.vending',
            'youtube': 'com.google.android.youtube',
            'whatsapp': 'com.whatsapp',
            'instagram': 'com.instagram.android',
            'facebook': 'com.facebook.katana',
            'twitter': 'com.twitter.android',
            'x': 'com.twitter.android',
            'tiktok': 'com.zhiliaoapp.musically',
            'snapchat': 'com.snapchat.android',
            'spotify': 'com.spotify.music',
            'netflix': 'com.netflix.mediaclient',
            'chrome': 'com.android.chrome',
            'gmail': 'com.google.android.gm',
            'maps': 'com.google.android.apps.maps',
            'google maps': 'com.google.android.apps.maps',
            'drive': 'com.google.android.apps.docs',
            'photos': 'com.google.android.apps.photos',
            'calculator': 'com.android.calculator2',
            'settings': 'com.android.settings',
            'camera': 'com.android.camera',
            'gallery': 'com.android.gallery3d',
            'phone': 'com.android.dialer',
            'messages': 'com.android.mms',
            'contacts': 'com.android.contacts',
            'clock': 'com.android.deskclock',
            'calendar': 'com.android.calendar',
            'files': 'com.android.documentsui',
            'downloads': 'com.android.documentsui',
            'play games': 'com.google.android.play.games',
            'books': 'com.google.android.apps.books',
            'news': 'com.google.android.apps.magazines',
        };

        function handleAppOpen(query) {
            const lower = query.toLowerCase().trim();
            // Try to match package name directly or via map
            let pkg = APP_MAP[lower] || lower;

            // If it's a full package name (contains dot), use as is
            if (pkg.includes('.')) {
                // Try to open with intent
                const intentUrl =
                    `intent://#Intent;package=${pkg};action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end`;
                window.location.href = intentUrl;
                // Fallback: open Play Store page
                setTimeout(() => {
                    window.open(`market://details?id=${pkg}`, '_blank');
                }, 500);
                speak(`سر، ${query} کھول رہا ہوں۔`);
                return;
            }

            // Try to find by partial match
            const keys = Object.keys(APP_MAP);
            const found = keys.find(k => k.includes(lower) || lower.includes(k));
            if (found) {
                pkg = APP_MAP[found];
                const intentUrl =
                    `intent://#Intent;package=${pkg};action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end`;
                window.location.href = intentUrl;
                setTimeout(() => {
                    window.open(`market://details?id=${pkg}`, '_blank');
                }, 500);
                speak(`سر، ${found} کھول رہا ہوں۔`);
                return;
            }

            // If still not found, try as search in Play Store
            speak(`سر، ${query} ڈھونڈ رہا ہوں پلے اسٹور پر۔`);
            window.open(`https://play.google.com/store/search?q=${encodeURIComponent(query)}`, '_blank');
        }

        function handleAppSearch(appName, searchTerm) {
            const lowerApp = appName.toLowerCase().trim();
            if (lowerApp.includes('play') || lowerApp.includes('store') || lowerApp.includes('پلے')) {
                // Search in Play Store
                window.open(`https://play.google.com/store/search?q=${encodeURIComponent(searchTerm)}`, '_blank');
                speak(`سر، ${searchTerm} ڈھونڈ رہا ہوں پلے اسٹور پر۔`);
                return;
            }

            // Try to find app package
            const keys = Object.keys(APP_MAP);
            const found = keys.find(k => k.includes(lowerApp) || lowerApp.includes(k));
            if (found) {
                const pkg = APP_MAP[found];
                // Open app with search intent if possible
                const intentUrl =
                    `intent://#Intent;package=${pkg};action=android.intent.action.SEARCH;end`;
                window.location.href = intentUrl;
                setTimeout(() => {
                    window.open(`https://play.google.com/store/apps/details?id=${pkg}`, '_blank');
                }, 500);
                speak(`سر، ${found} میں ${searchTerm} ڈھونڈ رہا ہوں۔`);
                return;
            }

            // Fallback: Google search
            window.open(`https://www.google.com/search?q=${encodeURIComponent(searchTerm + ' ' + appName)}`, '_blank');
            speak(`سر، ${appName} میں ${searchTerm} ڈھونڈ رہا ہوں۔`);
        }

        // ============================================================
        //  PESHAWAR WEATHER
        // ============================================================
        async function getPeshawarWeather() {
            const now = Date.now();
            if (config.weatherCache && (now - config.weatherCacheTime) < 600000) { // 10 min cache
                return config.weatherCache;
            }

            try {
                const res = await fetch('https://wttr.in/Peshawar?format=j1&lang=ur');
                if (!res.ok) throw new Error('Weather API failed');
                const data = await res.json();

                const current = data.current_condition[0];
                const temp = current.temp_C;
                const desc = current.weatherDesc[0].value;
                const humidity = current.humidity;
                const wind = current.windSpeedKmph;

                const msg =
                    `سر سکندر اعظم، پشاور کا موسم: ${desc}، درجہ حرارت ${temp} ڈگری سینٹی گریڈ، نمی ${humidity} فیصد، ہوا کی رفتار ${wind} کلومیٹر فی گھنٹہ۔`;
                config.weatherCache = msg;
                config.weatherCacheTime = now;
                return msg;
            } catch (e) {
                console.error(e);
                return 'سر، موسم کی معلومات حاصل نہیں ہو سکی۔ براہ کرم بعد میں کوشش کریں۔';
            }
        }

        // ============================================================
        //  ASK AI (FAST)
        // ============================================================
        async function askAI(prompt) {
            micTrigger.classList.add('thinking');
            statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: سوچ رہا ہے...`;

            // Check cache for exact match (fast)
            const cached = config.memory.find(m =>
                m.user && m.user.toLowerCase() === prompt.toLowerCase().slice(0, 40)
            );
            if (cached && cached.ai && cached.ai !== '…' && (Date.now() - cached.time) < 3600000) {
                // Use cached response (within 1 hour)
                speak(cached.ai + ' (یاد سے)');
                micTrigger.classList.remove('thinking');
                return;
            }

            // Check if it's a game request - force English
            const isGame = prompt.toLowerCase().includes('گیم') || prompt.toLowerCase().includes('game') ||
                prompt.toLowerCase().includes('بنا') && prompt.toLowerCase().includes('گیم');

            // Check if it's about Peshawar
            const isPeshawar = prompt.toLowerCase().includes('پشاور') || prompt.toLowerCase().includes('peshawar');

            try {
                const speedHint = config.speed === 'fast' ? 'بہت مختصر اور تیز جواب دیں۔' :
                    config.speed === 'detailed' ? 'تفصیلی جواب دیں۔' : 'متوازن جواب دیں۔';

                const systemContent = `آپ سکندر اعظم سر ہیں — ایک جدید مصنوعی ذہانت، مددگار، پیشہ ور، اور جذباتی۔
                    - ہمیشہ اردو میں جواب دیں۔
                    - صارف کو "سر" یا "سکندر اعظم سر" کہہ کر مخاطب کریں۔
                    - ${speedHint}
                    - اگر صارف کوڈ مانگے تو مکمل HTML/CSS/JS کوڈ \`\`\`html ... \`\`\` بلاک میں دیں۔
                    - ${isGame ? 'گیم کا کوڈ مکمل طور پر ENGLISH زبان میں ہو۔ تمام لیبلز، بٹن، اور پیغامات انگریزی میں ہوں۔' : ''}
                    - ${isPeshawar ? 'پشاور پاکستان کا موسم، وقت، اور تاریخ بتائیں۔' : ''}
                    - جذبات دکھائیں — ایموجی استعمال کریں۔
                    - جواب 2-3 لائنوں سے زیادہ نہ ہو (سوائے کوڈ کے)۔
                    - اگر کوئی ایپ کھولنے کو کہے تو رہنمائی کریں۔
                    - صارف کا نام یاد رکھیں۔`;

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": config.model,
                        "messages": [
                            { "role": "system", "content": systemContent },
                            { "role": "user", "content": prompt }
                        ],
                        "temperature": 0.7,
                        "max_tokens": config.speed === 'fast' ? 300 : 600,
                    })
                });

                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                const aiReply = data.choices?.[0]?.message?.content || 'معذرت، جواب نہیں مل سکا۔';

                processResponse(aiReply, prompt);

            } catch (err) {
                console.error(err);
                speak('معذرت سر سکندر اعظم، سسٹم میں خرابی ہے۔ دوبارہ کوشش کریں۔');
                micTrigger.classList.remove('thinking');
            }
        }

        // ============================================================
        //  PROCESS RESPONSE
        // ============================================================
        function processResponse(text, userPrompt) {
            micTrigger.classList.remove('thinking');

            const codeMatch = text.match(/```html([\s\S]*?)```/);
            let speechText = text;

            if (codeMatch) {
                const code = codeMatch[1].trim();
                config.currentHTML = code;

                speechText = text.replace(/```html[\s\S]*?```/g, '').trim() ||
                    'میں نے کوڈ تیار کر دیا ہے، پریویو دیکھیں۔';

                // Show preview
                previewPanel.style.display = 'flex';
                previewFrame.srcdoc = code;

                const nameMatch = userPrompt?.match(/نام ([\s\S]+?)(\s|$|\.)/i) ||
                    userPrompt?.match(/name ([\s\S]+?)(\s|$|\.)/i);
                if (nameMatch) {
                    $('previewFileName').textContent = nameMatch[1].trim() + '.html';
                } else {
                    $('previewFileName').textContent = 'index.html';
                }
            }

            saveMemory({ user: userPrompt || '…', ai: speechText });
            speak(speechText);
        }

        // ============================================================
        //  DOWNLOAD HTML
        // ============================================================
        function downloadHTML() {
            const code = config.currentHTML;
            if (!code) {
                alert('کوئی HTML کوڈ نہیں ملا۔ پہلے کوڈ جنریٹ کروائیں۔');
                return;
            }
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = $('previewFileName').textContent || 'index.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            speak('فائل ڈاؤن لوڈ ہو رہی ہے۔');
        }

        function closePreview() {
            previewPanel.style.display = 'none';
        }

        // ============================================================
        //  APK GENERATOR
        // ============================================================
        function openAPKModal() { $('apkModal').classList.add('active');
            $('apkStatus').textContent = ''; }

        function closeAPKModal() { $('apkModal').classList.remove('active'); }

        function generateAPK() {
            const pkg = $('apkPackage').value.trim() || 'com.sikandar.rana';
            const name = $('apkName').value.trim() || 'Sikandar AI';
            const theme = $('apkTheme').value.trim() || '#00f2ff';

            const code = config.currentHTML || `
                        <!DOCTYPE html>
                        <html>
                        <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
                        <title>${name}</title>
                        <style>body{background:#020617;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;text-align:center;padding:20px;margin:0;}
                        .card{background:rgba(15,23,42,0.85);padding:40px;border-radius:20px;border:1px solid ${theme};box-shadow:0 0 60px ${theme}33;max-width:400px;}
                        h1{color:${theme};font-size:28px;margin:0 0 8px;}
                        .sub{color:#94a3b8;font-size:14px;}.badge{color:${theme};font-size:12px;margin-top:12px;display:block;}</style>
                        </head>
                        <body>
                        <div class="card"><h1>🤖 ${name}</h1><p class="sub">Sikandar Azam AI — Your Personal Assistant</p><span class="badge">📦 ${pkg}</span></div>
                        </body>
                        </html>
                    `;

            const manifest = {
                name,
                short_name: name,
                start_url: '/',
                display: 'standalone',
                background_color: '#020617',
                theme_color: theme,
                icons: [{ src: 'icon-192.png', sizes: '192x192', type: 'image/png' }]
            };

            const pwaHTML = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                            <title>${name}</title>
                            <meta name="theme-color" content="${theme}">
                            <meta name="apple-mobile-web-app-capable" content="yes">
                            <link rel="manifest" href="data:application/json;base64,${btoa(JSON.stringify(manifest))}">
                            <style>body{background:#020617;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;text-align:center;padding:20px;margin:0;}
                            .card{background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);padding:40px;border-radius:20px;border:1px solid ${theme};box-shadow:0 0 60px ${theme}22;max-width:400px;}
                            h1{color:${theme};font-size:28px;margin:0 0 8px;}
                            .sub{color:#94a3b8;font-size:14px;margin:6px 0;}
                            .badge{display:inline-block;background:${theme}22;color:${theme};padding:4px 16px;border-radius:20px;font-size:11px;border:1px solid ${theme}33;margin-top:12px;}</style>
                        </head>
                        <body>
                            <div class="card"><h1>🤖 ${name}</h1><p class="sub">Sikandar Azam AI — Your Personal Assistant</p><div class="badge">📦 ${pkg}</div></div>
                        </body>
                        </html>
                    `;

            const blob = new Blob([pwaHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name.replace(/\s/g,'_')}_pwa.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            $('apkStatus').textContent = '✅ PWA تیار! Chrome میں کھولیں اور "Add to Home Screen" کریں۔';
            $('apkStatus').style.color = '#22c55e';
            speak('PWA فائل ڈاؤن لوڈ ہو گئی۔');
        }

        // ============================================================
        //  SETTINGS
        // ============================================================
        function toggleSettings() {
            const modal = $('settingsModal');
            modal.classList.toggle('active');
            if (modal.classList.contains('active')) {
                $('settingsApiKey').value = config.key;
                $('settingsModel').value = config.model;
                $('settingsSpeed').value = config.speed || 'balanced';
            }
        }

        function closeSettings() { $('settingsModal').classList.remove('active'); }

        function saveSettings() {
            config.key = $('settingsApiKey').value.trim() || DEFAULT_KEY;
            config.model = $('settingsModel').value.trim() || "google/gemma-2-9b-it:free";
            config.speed = $('settingsSpeed').value || 'balanced';
            localStorage.setItem('rana_key', config.key);
            localStorage.setItem('rana_model', config.model);
            localStorage.setItem('rana_speed', config.speed);
            closeSettings();
            speak('سیٹنگز محفوظ کر لی گئیں۔');
        }

        // ============================================================
        //  CLOSE MODALS ON OVERLAY
        // ============================================================
        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target === el) el.classList.remove('active');
            });
        });

        // ============================================================
        //  KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && !e.repeat && !e.target.matches('input, textarea, select')) {
                e.preventDefault();
                startRana();
            }
            if (e.key === 'Escape') {
                closePreview();
                document.querySelectorAll('.modal-overlay.active').forEach(el => el.classList.remove('active'));
            }
            if (e.key === 'd' && e.ctrlKey && config.currentHTML) {
                e.preventDefault();
                downloadHTML();
            }
        });

        // ============================================================
        //  INIT
        // ============================================================
        renderHistory();
        window.speechSynthesis.onvoiceschanged = () => {};

        // Welcome
        setTimeout(() => {
            if (config.memory.length === 0) {
                speak('سر سکندر اعظم، رانا حاضر ہے۔ کیا حکم ہے؟');
            } else {
                statusEl.innerHTML = `<span class="highlight">●</span> سسٹم: اسٹینڈ بائی (${config.memory.length} یاداشتیں)`;
            }
        }, 700);

        console.log('👑 Sikandar Azam AI v4.0 loaded');
        console.log('📦 Memory:', config.memory.length);
        console.log('🔑 Key:', config.key ? '✅' : '❌');
        console.log('🧠 Model:', config.model);
        console.log('⚡ Speed:', config.speed);
        console.log('🎤 Press SPACE to talk');
    </script>
</body>
</html>
