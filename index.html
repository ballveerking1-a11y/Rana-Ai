<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sikandar AI — Ultra Pro v10.0</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon: #00f2ff;
            --purple: #7000ff;
            --bg: #010409;
            --glass: rgba(13, 17, 23, 0.9);
            --border: rgba(0, 242, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- UI COMPONENTS --- */
        .sidebar {
            width: 320px;
            background: var(--glass);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
        }

        .main-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
        }

        /* --- CORE VISUALIZER --- */
        .core-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .arc-reactor {
            position: relative;
            width: 250px; height: 250px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .arc-ring {
            position: absolute;
            border: 2px solid transparent;
            border-radius: 50%;
            border-top: 2px solid var(--neon);
            animation: rotate var(--t) linear infinite;
        }
        .r1 { width: 100%; height: 100%; --t: 4s; opacity: 0.2; }
        .r2 { width: 80%; height: 80%; --t: 3s; border-top-color: var(--purple); opacity: 0.5; }
        .r3 { width: 60%; height: 60%; --t: 2s; box-shadow: 0 0 20px var(--neon); }

        .core-glow {
            width: 80px; height: 80px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--neon);
            z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        .core-glow i { color: black; font-size: 30px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- CONSOLE --- */
        .console {
            height: 150px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 2px solid var(--border);
            padding: 20px;
            font-family: 'Noto Nastaliq Urdu', serif;
            font-size: 20px;
            text-align: center;
            color: var(--neon);
        }

        /* --- MODALS & BUTTONS --- */
        .settings-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .settings-card {
            background: #0d1117; border: 1px solid var(--neon);
            padding: 30px; border-radius: 15px; width: 400px;
        }
        .settings-card h2 { font-family: 'Orbitron'; margin-bottom: 20px; color: var(--neon); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #888; }
        .input-group input {
            width: 100%; padding: 10px; background: #161b22;
            border: 1px solid #30363d; color: white; border-radius: 5px; outline: none;
        }
        .btn-action {
            width: 100%; padding: 12px; background: var(--neon);
            color: black; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;
        }

        .side-btn {
            position: absolute; bottom: 180px; left: 30px;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--border);
            color: var(--neon); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #preview-panel {
            position: fixed; right: -100%; top: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; transition: 0.5s;
        }
    </style>
</head>
<body>

    <!-- Sidebar Logs -->
    <aside class="sidebar">
        <h2 style="font-family:'Orbitron'; font-size:18px; color:var(--neon);">LOGS</h2>
        <div id="historyLogs" style="flex:1; overflow-y:auto; margin-top:10px; font-size:12px;"></div>
        <div id="dateTimeDisplay" style="padding:10px; background:rgba(0,0,0,0.3); border-radius:5px; font-family:'Orbitron'; font-size:14px; color:var(--purple);"></div>
    </aside>

    <!-- Main Section -->
    <main class="main-screen">
        <div class="core-box">
            <div class="arc-reactor" onclick="startVoice()">
                <div class="arc-ring r1"></div>
                <div class="arc-ring r2"></div>
                <div class="arc-ring r3"></div>
                <div class="core-glow" id="coreGlow">
                    <i class="fas fa-microphone"></i>
                </div>
            </div>
            <p id="statusLabel" style="margin-top:20px; font-family:'Orbitron'; letter-spacing:2px; font-size:10px;">SYSTEM ONLINE</p>
        </div>

        <div class="console" id="outputConsole">
            "خوش آمدید، سکندر اعظم سر۔"
        </div>

        <button class="side-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
    </main>

    <!-- Settings -->
    <div class="settings-overlay" id="settingsModal">
        <div class="settings-card">
            <h2>SYSTEM CONFIG</h2>
            <div class="input-group">
                <label>GROQ API KEY</label>
                <input type="password" id="apiKeyInput" placeholder="Enter API Key">
            </div>
            <div class="input-group">
                <label>MODEL NAME</label>
                <input type="text" id="modelInput" value="llama3-70b-8192">
            </div>
            <button class="btn-action" onclick="saveConfig()">SAVE CONFIGURATION</button>
            <p onclick="toggleSettings()" style="text-align:center; color:red; margin-top:10px; cursor:pointer;">CLOSE</p>
        </div>
    </div>

    <!-- Preview -->
    <div id="preview-panel">
        <div style="background:#000; color:#00f2ff; padding:10px; display:flex; justify-content:space-between;">
            <span>LIVE RENDER</span>
            <button onclick="closePreview()" style="color:red; background:none; border:none; cursor:pointer;">CLOSE</button>
        </div>
        <iframe id="previewFrame" style="width:100%; height:calc(100% - 40px); border:none;"></iframe>
    </div>

    <script>
        // --- Core Configuration & Memory ---
        let config = {
            apiKey: localStorage.getItem('v10_key') || '',
            model: localStorage.getItem('v10_model') || 'llama3-70b-8192',
            memory: JSON.parse(localStorage.getItem('v10_memory') || '[]')
        };

        const outputConsole = document.getElementById('outputConsole');
        const dateTimeDisplay = document.getElementById('dateTimeDisplay');
        const historyLogs = document.getElementById('historyLogs');

        // --- Time & Date Handler (Pakistan Time) ---
        function updateTime() {
            const now = new Date();
            const options = { timeZone: 'Asia/Karachi', hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const dateOptions = { timeZone: 'Asia/Karachi', day: 'numeric', month: 'long', year: 'numeric' };
            
            const timeStr = now.toLocaleTimeString('en-US', options);
            const dateStr = now.toLocaleDateString('en-US', dateOptions);
            
            dateTimeDisplay.innerHTML = `${timeStr}<br><span style="font-size:10px;">${dateStr}</span>`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- Voice Logic ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';

        recognition.onstart = () => {
            document.getElementById('coreGlow').style.background = 'red';
            document.getElementById('statusLabel').innerText = 'LISTENING...';
        };

        recognition.onend = () => {
            document.getElementById('coreGlow').style.background = 'var(--neon)';
            document.getElementById('statusLabel').innerText = 'SYSTEM STANDBY';
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            handleResponse(text);
        };

        function startVoice() {
            if(!config.apiKey) return alert("Please add API Key in Settings!");
            recognition.start();
        }

        // --- App Package Launcher ---
        function launchApp(packageName) {
            // Intent URL to launch Android apps by package name
            const intentUrl = `intent://#Intent;package=${packageName};action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end`;
            window.location.href = intentUrl;
        }

        // --- Brain Center ---
        async function handleResponse(input) {
            updateLog("USER: " + input);
            outputConsole.innerText = "پروسیسنگ، سکندر اعظم سر...";

            // Package Name Logic (Pre-defined some popular ones)
            const packageMap = {
                'یوٹیوب': 'com.google.android.youtube',
                'واٹس ایپ': 'com.whatsapp',
                'فیس بک': 'com.facebook.katana',
                'انسٹاگرام': 'com.instagram.android',
                'ٹک ٹاک': 'com.zhiliaoapp.musically',
                'پلے اسٹور': 'com.android.vending',
                'کیمرہ': 'com.android.camera'
            };

            // Check if user wants to open an app
            if (input.toLowerCase().includes('کھولو') || input.toLowerCase().includes('open')) {
                for (let key in packageMap) {
                    if (input.includes(key)) {
                        speak(`سکندر اعظم سر، ${key} کھول رہا ہوں۔`);
                        launchApp(packageMap[key]);
                        return;
                    }
                }
            }

            // Check for Time & Date in Urdu
            if (input.includes('وقت') || input.includes('ٹائم')) {
                const pakTime = new Date().toLocaleTimeString('ur-PK', { timeZone: 'Asia/Karachi' });
                speak(`سکندر اعظم سر، پاکستان میں اس وقت ${pakTime} ہو رہا ہے۔`);
                return;
            }
            if (input.includes('تاریخ')) {
                const pakDate = new Date().toLocaleDateString('ur-PK', { timeZone: 'Asia/Karachi', day: 'numeric', month: 'long', year: 'numeric' });
                speak(`سکندر اعظم سر، آج کی تاریخ ہے ${pakDate}۔`);
                return;
            }

            // AI Call
            askAI(input);
        }

        async function askAI(prompt) {
            // Memory Context (Last 5 messages)
            const context = config.memory.slice(-5).map(m => m.role + ": " + m.content).join("\n");
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [
                            { role: "system", content: "Your name is Sikandar AI. You must ALWAYS address the user as 'Sikandar Azam Sir'. You are a genius professional assistant. Answer in Urdu. Use memory to stay consistent." },
                            { role: "user", content: `Context:\n${context}\n\nQuestion: ${prompt}` }
                        ]
                    })
                });

                const data = await res.json();
                const aiMsg = data.choices[0].message.content;

                // Save to memory
                config.memory.push({ role: "user", content: prompt });
                config.memory.push({ role: "assistant", content: aiMsg });
                if(config.memory.length > 20) config.memory.shift();
                localStorage.setItem('v10_memory', JSON.stringify(config.memory));

                if (aiMsg.includes("```html")) {
                    const code = aiMsg.match(/```html([\s\S]*?)```/)[1];
                    document.getElementById('previewFrame').srcdoc = code;
                    document.getElementById('preview-panel').style.right = '0';
                    speak("سکندر اعظم سر، میں نے کوڈ تیار کر دیا ہے، آپ پریویو دیکھ سکتے ہیں۔");
                } else {
                    speak(aiMsg);
                }

            } catch (err) {
                speak("سکندر اعظم سر، معذرت چاہتا ہوں، سرور سے رابطہ نہیں ہو پا رہا۔");
            }
        }

        function speak(text) {
            outputConsole.innerText = text;
            updateLog("AI: " + text);
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'ur-PK';
            window.speechSynthesis.speak(speech);
        }

        function updateLog(msg) {
            const log = document.createElement('div');
            log.style.marginBottom = '8px';
            log.style.borderBottom = '1px solid #161b22';
            log.innerText = msg;
            historyLogs.prepend(log);
        }

        // --- Config Handlers ---
        function toggleSettings() {
            const m = document.getElementById('settingsModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveConfig() {
            config.apiKey = document.getElementById('apiKeyInput').value;
            config.model = document.getElementById('modelInput').value;
            localStorage.setItem('v10_key', config.apiKey);
            localStorage.setItem('v10_model', config.model);
            alert("SYSTEM RE-CALIBRATED!");
            toggleSettings();
        }

        function closePreview() {
            document.getElementById('preview-panel').style.right = '-100%';
        }
    </script>
</body>
</html>
